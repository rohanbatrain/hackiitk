# GitLab CI/CD Configuration for Extreme Testing Framework
#
# This configuration provides comprehensive testing across all categories
# with selective execution support for fast vs full test suites.

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  HYPOTHESIS_PROFILE: "ci"
  PYTEST_ADDOPTS: "--color=yes"

# Define stages
stages:
  - quick-validation
  - extreme-testing
  - report

# Cache pip packages
cache:
  paths:
    - .cache/pip
    - .hypothesis/

# Quick validation tests (runs on every push)
quick-tests:
  stage: quick-validation
  image: python:3.11
  timeout: 30 minutes
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov hypothesis psutil
    # Run unit tests (non-slow, non-property)
    - pytest tests/ -v --tb=short -m "not slow and not property" 
        --cov=. --cov-report=xml --cov-report=html 
        --junit-xml=test-results/unit-tests.xml
    # Run quick property tests (10 examples)
    - pytest tests/extreme/test_properties.py -v --tb=short 
        --hypothesis-profile=quick 
        --junit-xml=test-results/quick-property-tests.xml
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - test-results/
      - htmlcov/
      - coverage.xml
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Property-based tests (comprehensive)
property-tests:
  stage: extreme-testing
  image: python:3.11
  timeout: 2 hours
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12"]
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov hypothesis psutil
    # Run property tests with 1000 examples
    - pytest tests/extreme/test_properties.py -v --tb=short 
        --cov=. --cov-report=xml --cov-report=html 
        --junit-xml=test-results/property-tests-${PYTHON_VERSION}.xml
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - test-results/
      - htmlcov/
      - coverage.xml
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: true

# Stress tests
stress-tests:
  stage: extreme-testing
  image: python:3.11
  timeout: 3 hours
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    # Run stress tests
    - pytest tests/extreme/engines/test_stress.py -v --tb=short 
        --junit-xml=test-results/stress-tests.xml
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml
    paths:
      - test-results/
      - test_outputs/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: true

