# Integration and chaos tests
integration-tests:
  stage: extreme-testing
  image: python:3.11
  timeout: 4 hours
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    # Run integration tests
    - pytest tests/extreme/engines/test_integration_chaos.py 
        tests/extreme/engines/test_batch_continuous.py 
        -v --tb=short 
        --junit-xml=test-results/integration-tests.xml
  artifacts:
    when: always
    reports:
      junit: test-results/*.xml
    paths:
      - test-results/
      - test_outputs/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: true

# Generate comprehensive report
generate-report:
  stage: report
  image: python:3.11
  timeout: 30 minutes
  dependencies:
    - property-tests
    - stress-tests
    - chaos-tests
    - adversarial-tests
    - boundary-tests
    - performance-tests
    - component-tests
    - integration-tests
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    # Generate comprehensive report from all test results
    - python -m tests.extreme.cli --categories all --output-dir test_outputs/extreme/
  artifacts:
    when: always
    paths:
      - test_outputs/extreme/
      - test-results/
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  allow_failure: true

# Nightly comprehensive test suite
nightly-full-suite:
  stage: extreme-testing
  image: python:3.11
  timeout: 12 hours
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    # Run full test suite with all categories
    - python -m tests.extreme.cli --categories all --verbose 
        --output-dir test_outputs/nightly/
  artifacts:
    when: always
    paths:
      - test_outputs/nightly/
      - test-results/
    expire_in: 90 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true

# Manual trigger for specific category
manual-category-test:
  stage: extreme-testing
  image: python:3.11
  timeout: 4 hours
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    # Run specific category (set via CI/CD variable TEST_CATEGORY)
    - python -m tests.extreme.cli --categories ${TEST_CATEGORY:-stress} 
        --verbose --output-dir test_outputs/manual/
  artifacts:
    when: always
    paths:
      - test_outputs/manual/
      - test-results/
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  allow_failure: true
