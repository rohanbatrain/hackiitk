name: Smoke Tests (Quick Validation)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Quick Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify dependencies
      run: |
        python -c "import langchain; import chromadb; import sentence_transformers; print('✓ Dependencies OK')"
    
    - name: Run smoke tests
      env:
        PYTHONPATH: /github/workspace
      run: |
        cd /github/workspace
        mkdir -p test_outputs/extreme
        
        # First, verify pytest can discover tests
        echo "=== Test Discovery ==="
        python -m pytest --collect-only tests/unit/ -q > /tmp/smoke-collect.txt || true
        head -30 /tmp/smoke-collect.txt
        
        # Run quick smoke tests with output capture
        echo "=== Running Smoke Tests ==="
        python -m pytest tests/unit/test_test_data_generator.py tests/unit/test_metrics_collector.py \
          -v --tb=short \
          --junitxml=test_outputs/extreme/junit_smoke.xml \
          --json-report --json-report-file=test_outputs/extreme/report_smoke.json || true
        
        # Show results
        echo "=== Test Results ==="
        ls -lh test_outputs/extreme/ || echo "No outputs generated"
        
        echo "✓ Smoke tests completed"
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-results
        path: test_outputs/
        if-no-files-found: ignore
