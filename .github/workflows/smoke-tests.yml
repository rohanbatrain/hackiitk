name: Smoke Tests (Quick Validation)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke-test:
    name: Quick Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-json-report
    
    - name: Verify dependencies
      run: |
        python -c "import langchain; import chromadb; import sentence_transformers; print('✓ Dependencies OK')"
    
    - name: Run smoke tests
      run: |
        export PYTHONPATH="${GITHUB_WORKSPACE}"
        mkdir -p test_outputs/extreme
        
        # First, verify pytest can discover tests
        echo "=== Test Discovery ==="
        python -m pytest --collect-only tests/unit/ -q > /tmp/smoke-collect.txt || true
        head -30 /tmp/smoke-collect.txt
        
        # Run quick smoke tests with output capture
        echo "=== Running Smoke Tests ==="
        python -m pytest tests/unit/test_test_data_generator.py tests/unit/test_metrics_collector.py \
          -v --tb=short \
          --junitxml=test_outputs/extreme/junit_smoke.xml \
          --json-report --json-report-file=test_outputs/extreme/report_smoke.json || true
        
        # Show results
        echo "=== Test Results ==="
        ls -lh test_outputs/extreme/ || echo "No outputs generated"
        
        echo "✓ Smoke tests completed"
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-results
        path: test_outputs/
        if-no-files-found: ignore
