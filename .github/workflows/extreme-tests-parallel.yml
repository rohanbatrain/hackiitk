  # Aggregate results from all parallel jobs
  aggregate-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: 
      - fast-property-tests
      - fast-boundary-tests
      - fast-adversarial-tests
      - stress-maximum-load
      - stress-concurrent-operations
      - stress-resource-leaks
      - chaos-disk-failures
      - chaos-memory-exhaustion
      - chaos-model-corruption
      - chaos-process-interruption
      - chaos-permissions-config
      - chaos-vector-store-corruption
      - performance-document-scaling
      - performance-chunk-scaling
      - performance-llm-context
      - performance-bottlenecks
    if: always() && (github.event_name == 'schedule' || github.event.inputs.test_mode == 'full')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-test-results
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Aggregate results
      run: |
        python -c "
        import json
        import os
        from pathlib import Path
        
        all_results = []
        results_dir = Path('all-test-results')
        
        for artifact_dir in results_dir.iterdir():
            if artifact_dir.is_dir():
                for json_file in artifact_dir.glob('*.json'):
                    if 'test_report' in json_file.name:
                        with open(json_file) as f:
                            all_results.append(json.load(f))
        
        # Aggregate statistics
        total_tests = sum(r.get('total_tests', 0) for r in all_results)
        total_passed = sum(r.get('passed', 0) for r in all_results)
        total_failed = sum(r.get('failed', 0) for r in all_results)
        total_errors = sum(r.get('errors', 0) for r in all_results)
        total_duration = sum(r.get('duration_seconds', 0) for r in all_results)
        
        aggregated = {
            'execution_date': max(r.get('execution_date', '') for r in all_results),
            'total_tests': total_tests,
            'passed': total_passed,
            'failed': total_failed,
            'errors': total_errors,
            'duration_seconds': total_duration,
            'pass_rate': (total_passed / total_tests * 100) if total_tests > 0 else 0,
            'parallel_jobs': len(all_results)
        }
        
        with open('aggregated_results.json', 'w') as f:
            json.dump(aggregated, f, indent=2)
        
        print(f'Aggregated {len(all_results)} test result files')
        print(f'Total: {total_tests} tests')
        print(f'Passed: {total_passed} ({aggregated[\"pass_rate\"]:.1f}%)')
        print(f'Failed: {total_failed}')
        print(f'Errors: {total_errors}')
        print(f'Duration: {total_duration/60:.1f} minutes (wall time with parallelization)')
        "
    
    - name: Upload aggregated results
      uses: actions/upload-artifact@v4
      with:
        name: aggregated-test-results
        path: aggregated_results.json
    
    - name: Comment PR with aggregated results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          if (fs.existsSync('aggregated_results.json')) {
            const results = JSON.parse(fs.readFileSync('aggregated_results.json', 'utf8'));
            
            const passIcon = results.pass_rate >= 95 ? '✅' : '⚠️';
            
            const body = `## ${passIcon} Extreme Test Suite Results (Highly Parallel)
            
            **Execution Mode:** ${results.parallel_jobs} parallel jobs
            **Total Tests:** ${results.total_tests}
            **Passed:** ✅ ${results.passed} (${results.pass_rate.toFixed(1)}%)
            **Failed:** ❌ ${results.failed}
            **Errors:** ⚠️ ${results.errors}
            **Wall Time:** ~${Math.round(results.duration_seconds / 60)} minutes
            
            ${results.pass_rate >= 95 ? '✅ **SUCCESS CRITERIA MET** (≥95% pass rate)' : '⚠️ **SUCCESS CRITERIA NOT MET** (target: ≥95% pass rate)'}
            
            [View detailed results in artifacts](../actions/runs/${context.runId})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
    
    - name: Check success criteria
      run: |
        python -c "
        import json
        import sys
        
        with open('aggregated_results.json') as f:
            results = json.load(f)
        
        pass_rate = results['pass_rate']
        
        if pass_rate < 95:
            print(f'❌ FAILED: Pass rate {pass_rate:.1f}% is below 95% threshold')
            sys.exit(1)
        else:
            print(f'✅ SUCCESS: Pass rate {pass_rate:.1f}% meets 95% threshold')
            sys.exit(0)
        "
