name: Extreme Testing Suite (Highly Parallel)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run full suite weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode to run'
        required: false
        default: 'fast'
        type: choice
        options:
          - fast
          - full
          - stress-only
          - chaos-only
          - performance-only

jobs:
  # Fast tests on every push/PR - runs in parallel
  fast-property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.inputs.test_mode == 'fast'
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run property tests
      run: |
        python -m tests.extreme.cli --categories property --verbose
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: property-test-results
        path: test_outputs/extreme/*

  fast-boundary-tests:
    name: Boundary Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.inputs.test_mode == 'fast'
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run boundary tests
      run: |
        python -m tests.extreme.cli --categories boundary --verbose
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: boundary-test-results
        path: test_outputs/extreme/*

  fast-adversarial-tests:
    name: Adversarial Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.inputs.test_mode == 'fast'
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run adversarial tests
      run: |
        python -m tests.extreme.cli --categories adversarial --verbose
      continue-on-error: true
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: adversarial-test-results
        path: test_outputs/extreme/*

  # Full suite - highly parallelized by individual test engines
  stress-maximum-load:
    name: Stress - Maximum Load
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.test_mode == 'full' || github.event.inputs.test_mode == 'stress-only'
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run maximum load tests
      run: |
        python -m pytest tests/extreme/engines/test_stress_tester.py::TestStressTester::test_maximum_document_size -v
        python -m pytest tests/extreme/engines/test_stress_tester.py::TestStressTester::test_reference_catalog_scale -v
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: stress-maximum-load-results
        path: test_outputs/extreme/*

