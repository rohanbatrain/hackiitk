name: Desktop Electron Release

on:
  push:
    tags:
      - 'desktop-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            desktop/package-lock.json
            desktop/renderer/package-lock.json

      - name: Install dependencies
        run: |
          cd desktop
          npm ci
          npm --prefix renderer ci

      - name: Validate desktop workspace
        run: |
          cd desktop
          npm run typecheck
          npm run lint
          npm run test
          npm run build

      - name: Build installers
        run: |
          cd desktop
          npm run dist
          npm run release:chunk-assets

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.os }}
          path: |
            desktop/release/**
            desktop/release-chunks/**

  publish-desktop:
    needs: build-desktop
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          merge-multiple: true
          path: desktop-release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-release/**
          generate_release_notes: true
