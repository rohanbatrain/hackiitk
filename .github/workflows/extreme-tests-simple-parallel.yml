name: Extreme Testing Suite (Production Ready with Ollama)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Test category to run (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - property
          - boundary
          - adversarial
          - stress
          - chaos
          - performance
          - unit
          - integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-suite:
    name: ${{ matrix.category }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        category:
          - property
          - boundary
          - adversarial
          - stress
          - chaos
          - performance
          - unit
          - integration
    
    # Use pre-built Docker container with all dependencies
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          pip-
    
    - name: Cache Hypothesis database
      uses: actions/cache@v4
      with:
        path: .hypothesis/
        key: hypothesis-${{ hashFiles('tests/**/*.py') }}
        restore-keys: |
          hypothesis-
    
    - name: Setup Ollama
      run: |
        # Install Ollama using official install script
        curl -fsSL https://ollama.com/install.sh | sh
        
        # Start Ollama service in background mode
        ollama serve &
        
        # Add sleep delay for service readiness
        sleep 10
        
        # Verify Ollama service status before tests
        if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
          echo "✓ Ollama service is running"
          
          # Pull qwen2.5:3b model with fallback on failure
          if ollama pull qwen2.5:3b; then
            echo "✓ Model qwen2.5:3b pulled successfully"
          else
            echo "⚠️ Model pull failed, tests will use mock implementations"
          fi
        else
          echo "⚠️ Ollama service not responding, tests will use mock implementations"
        fi
    
    - name: Verify dependencies
      run: |
        python -c "import langchain; import chromadb; import sentence_transformers; print('✓ All dependencies available')"
        echo "✓ Ollama status:"
        ollama list || echo "Ollama not available, tests will use mocks"
    
    - name: Run ${{ matrix.category }} tests
      env:
        OLLAMA_HOST: http://localhost:11434
        PYTHONPATH: /github/workspace
      run: |
        cd /github/workspace
        
        # Make script executable
        chmod +x .github/scripts/run_tests.sh
        
        # Run tests using the comprehensive script
        .github/scripts/run_tests.sh "${{ matrix.category }}" "test_outputs/extreme"
      continue-on-error: true
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.category }}
        path: |
          test_outputs/extreme/*.json
          test_outputs/extreme/*.html
          test_outputs/extreme/*.xml
        if-no-files-found: ignore
        retention-days: 30
  
  aggregate-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: test-suite
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        path: all-test-results
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Aggregate results
      run: |
        python3 .github/scripts/aggregate_results.py all-test-results
    
    - name: Upload aggregated results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: aggregated-test-results
        path: aggregated_results.json
