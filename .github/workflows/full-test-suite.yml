name: Full Test Suite (All Tests with Multiple Models)

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      models:
        description: 'Models to test (comma-separated)'
        required: false
        default: 'qwen2.5:3b,phi3.5:3.8b'

jobs:
  full-test-suite:
    name: Full Tests - ${{ matrix.model }}
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours
    
    strategy:
      fail-fast: false
      matrix:
        model:
          - qwen2.5:3b
          - phi3.5:3.8b
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install UV package manager
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies with UV
      run: |
        uv pip install --system -r requirements.txt
    
    - name: Setup Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 15
        ollama pull ${{ matrix.model }}
        ollama list

    - name: Normalize model label
      id: model_label
      run: |
        echo "safe=$(echo '${{ matrix.model }}' | tr ':/' '--')" >> "$GITHUB_OUTPUT"
    
    - name: Run complete test suite
      env:
        OLLAMA_HOST: http://localhost:11434
        OLLAMA_MODEL: ${{ matrix.model }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # Run all test categories
        echo "Running full test suite with model: ${{ matrix.model }}"
        
        # Property-based tests
        python -m pytest tests/property/ tests/extreme/engines/test_property_test_expander.py -v --tb=short --maxfail=10 || true
        
        # Boundary tests
        python -m pytest tests/extreme/engines/test_boundary_tester.py -v --tb=short || true
        
        # Adversarial tests
        python -m pytest tests/extreme/engines/test_adversarial_tester.py -v --tb=short || true
        
        # Stress tests
        python -m pytest tests/extreme/engines/test_stress_tester.py tests/extreme/engines/test_component_stress_tester.py -v --tb=short || true
        
        # Chaos tests
        python -m pytest tests/extreme/engines/test_chaos_engine.py tests/extreme/engines/test_integration_chaos.py -v --tb=short || true
        
        # Performance tests
        python -m pytest tests/extreme/engines/test_performance_profiler.py -v --tb=short || true
        
        # Unit tests
        python -m pytest tests/unit/ -v --tb=short || true
        
        # Integration tests
        python -m pytest tests/integration/ -v --tb=short || true
        
        # Additional extreme tests
        python -m pytest tests/extreme/engines/ -v --tb=short --maxfail=20 || true
    
    - name: Generate test report
      if: always()
      run: |
        echo "# Test Report for ${{ matrix.model }}" > test_report_${{ steps.model_label.outputs.safe }}.md
        echo "Generated at: $(date)" >> test_report_${{ steps.model_label.outputs.safe }}.md
        echo "" >> test_report_${{ steps.model_label.outputs.safe }}.md
        echo "See artifacts for detailed results" >> test_report_${{ steps.model_label.outputs.safe }}.md
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ steps.model_label.outputs.safe }}
        path: |
          test_outputs/
          test_report_*.md
          .pytest_cache/
        if-no-files-found: ignore
    
    - name: Upload coverage
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ steps.model_label.outputs.safe }}
        path: |
          htmlcov/
          .coverage
        if-no-files-found: ignore
