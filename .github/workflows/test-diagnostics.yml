name: Test Diagnostics (Debug Test Discovery)

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose Test Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    container:
      image: ghcr.io/${{ github.repository }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Environment Information
      run: |
        echo "=== Python Version ==="
        python --version
        
        echo ""
        echo "=== Working Directory ==="
        pwd
        
        echo ""
        echo "=== PYTHONPATH ==="
        echo "$PYTHONPATH"
        
        echo ""
        echo "=== Installed Packages ==="
        pip list | grep -E "(pytest|hypothesis|langchain|chromadb)"
    
    - name: Test File Discovery
      run: |
        echo "=== Test Files Count ==="
        find tests -name "test_*.py" -o -name "*_test.py" | wc -l
        
        echo ""
        echo "=== Sample Test Files ==="
        find tests -name "test_*.py" | head -20
        
        echo ""
        echo "=== Test Directory Structure ==="
        tree -L 3 tests/ || find tests/ -type d | head -20
    
    - name: Pytest Discovery
      env:
        PYTHONPATH: /github/workspace
      run: |
        cd /github/workspace
        
        echo "=== Pytest Version ==="
        python -m pytest --version
        
        echo ""
        echo "=== Collect Unit Tests ==="
        python -m pytest --collect-only tests/unit/ 2>&1 | head -50
        
        echo ""
        echo "=== Collect Integration Tests ==="
        python -m pytest --collect-only tests/integration/ 2>&1 | head -30
        
        echo ""
        echo "=== Collect Extreme Tests ==="
        python -m pytest --collect-only tests/extreme/engines/ 2>&1 | head -30
    
    - name: Run Single Test
      env:
        PYTHONPATH: /github/workspace
      run: |
        cd /github/workspace
        
        echo "=== Running Single Test File ==="
        python -m pytest tests/unit/test_test_data_generator.py -v --tb=short || echo "Test failed or not found"
    
    - name: Check Dependencies
      run: |
        echo "=== Import Test ==="
        python -c "
        import sys
        print('Python path:', sys.path)
        
        try:
            import langchain
            print('✓ langchain imported')
        except Exception as e:
            print('✗ langchain import failed:', e)
        
        try:
            import chromadb
            print('✓ chromadb imported')
        except Exception as e:
            print('✗ chromadb import failed:', e)
        
        try:
            import hypothesis
            print('✓ hypothesis imported')
        except Exception as e:
            print('✗ hypothesis import failed:', e)
        
        try:
            import pytest
            print('✓ pytest imported')
        except Exception as e:
            print('✗ pytest import failed:', e)
        "
