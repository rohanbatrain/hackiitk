NIST_Cybersecurity_Framework_Metadata:
  title: "NIST Cybersecurity Framework (CSF) 2.0 - Policy Template Guide"
  source: "CIS / MS-ISAC Policy Template Guide 2024"
  purpose: >
    This configuration maps NIST CSF 2.0 subcategories to applicable policy and standard
    templates. It is intended to assist organizations in building, auditing, and improving
    their cybersecurity policy posture. Each subcategory includes its ID, a human-readable
    description, relevant policies, and contextual guidance for implementation.
  functions:
    - Govern
    - Identify
    - Protect
    - Detect
    - Respond
    - Recover
  usage_note: >
    Use this config to: (1) map existing policies to NIST CSF subcategories,
    (2) identify policy gaps, (3) generate policy templates tailored to specific subcategories,
    (4) answer NCSR (Nationwide Cybersecurity Review) questionnaires, or
    (5) assist LLMs in generating compliance documentation.

NIST_Cybersecurity_Framework:
  - NIST_Function: Govern
    function_description: >
      The GOVERN function establishes and monitors the organization's cybersecurity risk management
      strategy, expectations, and policy. It is the foundation for all other CSF functions and
      ensures that cybersecurity is treated as an enterprise-wide risk management concern —
      not just an IT problem. Governance includes organizational context, risk strategy, roles
      and responsibilities, policy creation, oversight, and supply chain risk management.
    Subheadings:

      - Title: "Govern: Organizational Context (GV.OC)"
        category_description: >
          Focuses on understanding the organization's mission, stakeholders, legal obligations,
          and risk environment. This context shapes all cybersecurity risk management decisions.
          Without a clear organizational context, risk management efforts lack alignment with
          actual business priorities and compliance requirements.
        Subparts:

          - ID: GV.OC-01
            Description: >
              The organizational mission is understood and informs cybersecurity risk management.
              This means cybersecurity decisions are made with explicit awareness of what the
              organization exists to do, what it values most, and what would cause the most
              harm if disrupted. Mission-driven cybersecurity ensures resources are allocated
              to protect what truly matters.
            Implementation_Guidance: >
              Document the organizational mission statement. Map critical assets and processes
              to that mission. Ensure the Information Security Policy references the mission
              explicitly and is reviewed when the mission changes.
            Key_Questions:
              - "Is the organizational mission documented and accessible to the security team?"
              - "Are cybersecurity priorities tied to mission-critical functions?"
              - "Does leadership review the alignment between mission and security posture annually?"
            Policies:
              - Information Security Policy

          - ID: GV.OC-02
            Description: >
              Internal and external stakeholders are understood, and their needs and expectations
              regarding cybersecurity risk management are understood and considered. Stakeholders
              include employees, executives, regulators, customers, vendors, and auditors.
              Understanding their expectations prevents compliance gaps and supports trust.
            Implementation_Guidance: >
              Conduct a stakeholder analysis. Identify internal stakeholders (IT, legal, HR, board)
              and external ones (regulators, customers, third-party auditors). Map their cybersecurity
              expectations and ensure your policies address them. Revisit after organizational changes.
            Key_Questions:
              - "Have all internal and external stakeholders been identified?"
              - "Are stakeholder cybersecurity requirements documented?"
              - "How are changing stakeholder expectations tracked?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.OC-03
            Description: >
              Legal, regulatory, and contractual requirements regarding cybersecurity — including
              privacy and civil liberties obligations — are understood and managed. Organizations
              must comply with applicable laws (e.g., HIPAA, FERPA, GDPR, state data breach laws)
              and contractual cybersecurity clauses. Non-compliance creates legal liability and
              reputational damage.
            Implementation_Guidance: >
              Maintain a legal and regulatory requirements register. Assign ownership for each
              requirement. Map regulatory requirements to specific policies and controls.
              Review the register annually and after any new legislation or contract signing.
            Key_Questions:
              - "Is there a current inventory of all applicable cybersecurity regulations?"
              - "Are contracts reviewed for cybersecurity obligations before signing?"
              - "Who owns compliance tracking for each regulatory requirement?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.OC-04
            Description: >
              Critical objectives, capabilities, and services that stakeholders depend on or
              expect from the organization are understood and communicated. This subcategory
              ensures the organization knows which services are essential and that all relevant
              parties understand what must be protected and kept available at all times.
            Implementation_Guidance: >
              Identify and document critical business services and the technology that supports them.
              Communicate these to IT, security, and leadership. Ensure the Incident Response Policy
              accounts for prioritizing recovery of these critical services first.
            Key_Questions:
              - "Are the top critical services and capabilities formally documented?"
              - "Do incident response plans prioritize recovery of critical services?"
              - "Are stakeholders regularly briefed on what is considered critical?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: GV.OC-05
            Description: >
              Outcomes of activities and the current cybersecurity risk posture are used to
              inform the types of risk management approaches applied and modified at all levels
              of the organization. This is about using real data — from audits, incidents, scans,
              and assessments — to continuously refine how the organization approaches risk.
            Implementation_Guidance: >
              Establish a regular risk posture reporting process. Use outputs from security
              assessments, vulnerability scans, and incident post-mortems to update risk
              management strategies. Present risk posture summaries to leadership quarterly.
            Key_Questions:
              - "Is there a process to translate cybersecurity outcomes into updated risk strategies?"
              - "How often is the risk posture reviewed by senior leadership?"
              - "Are risk management approaches adjusted based on real-world outcomes?"
            Policies:
              - System and Communications Protection Policy
              - Information Classification Standard
              - Information Security Policy

      - Title: "Govern: Risk Management Strategy (GV.RM)"
        category_description: >
          Defines the organization's overall approach to identifying, prioritizing, and responding
          to cybersecurity risks. A mature risk management strategy includes defined risk appetite,
          tolerance thresholds, standardized assessment methods, and integration with enterprise-wide
          risk management. This ensures cybersecurity risk decisions are consistent, transparent,
          and aligned with business goals.
        Subparts:

          - ID: GV.RM-01
            Description: >
              Risk management objectives are established and agreed to by organizational stakeholders.
              These objectives define what the organization is trying to achieve with its risk
              management program — e.g., reducing likelihood of breaches, maintaining regulatory
              compliance, ensuring service availability. Stakeholder agreement ensures buy-in
              and consistent prioritization.
            Implementation_Guidance: >
              Document risk management objectives in the Information Security Policy. Hold a
              cross-functional workshop to gain stakeholder agreement. Objectives should be
              SMART (specific, measurable, achievable, relevant, time-bound).
            Key_Questions:
              - "Are risk management objectives formally documented and approved?"
              - "Do all major stakeholders agree on the top risk management priorities?"
              - "Are objectives reviewed and updated at least annually?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RM-02
            Description: >
              Risk appetite and risk tolerance statements are established, communicated, and
              maintained. Risk appetite defines the amount of risk the organization is willing
              to accept in pursuit of its objectives. Risk tolerance defines the acceptable
              variation around that appetite. These statements guide all risk response decisions.
            Implementation_Guidance: >
              Draft formal risk appetite and tolerance statements with executive leadership input.
              Categorize appetite by risk type (e.g., operational, reputational, financial, compliance).
              Communicate statements to risk owners and review after major organizational changes.
            Key_Questions:
              - "Is risk appetite documented for different categories of risk?"
              - "Do risk owners know the organization's tolerance thresholds?"
              - "Are risk appetite statements reviewed after significant incidents?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RM-03
            Description: >
              Cybersecurity risk management activities and outcomes are included in enterprise
              risk management (ERM) processes. Cybersecurity should not operate in a silo —
              it must feed into and receive input from the broader ERM program. This enables
              holistic risk visibility and informed resource allocation.
            Implementation_Guidance: >
              Work with the ERM team to include cybersecurity risks in the enterprise risk register.
              Align cybersecurity risk reporting cycles with ERM reporting cycles. Ensure the CISO
              or security lead has a seat at ERM governance meetings.
            Key_Questions:
              - "Is cybersecurity represented in the enterprise risk register?"
              - "Does the ERM committee receive regular cybersecurity risk updates?"
              - "Are cybersecurity risk decisions escalated through ERM channels when appropriate?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RM-04
            Description: >
              Strategic direction that describes appropriate risk response options is established
              and communicated. The organization should define and communicate its preferred
              approaches to handling identified risks: accept, avoid, transfer, or mitigate.
              This guides consistent decision-making across teams and levels.
            Implementation_Guidance: >
              Document the organization's preferred risk response strategies for different risk
              categories. Include decision trees or criteria for choosing a response type.
              Train risk owners on how to apply these strategies.
            Key_Questions:
              - "Are risk response options (accept/avoid/transfer/mitigate) formally defined?"
              - "Do risk owners understand when each response type is appropriate?"
              - "Is strategic risk direction updated as the threat landscape changes?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RM-05
            Description: >
              Lines of communication across the organization are established for cybersecurity
              risks, including risks from suppliers and other third parties. Everyone with risk
              ownership or exposure — including those managing vendor relationships — must know
              how to report, escalate, and receive information about cybersecurity risks.
            Implementation_Guidance: >
              Define and document communication channels for risk reporting. Establish escalation
              paths from operational teams to leadership. Include third-party/vendor risk
              communication protocols in vendor management agreements.
            Key_Questions:
              - "Is there a documented process for reporting cybersecurity risks internally?"
              - "Are vendor and supplier risk communication channels defined?"
              - "Do all relevant parties know who to contact when a risk is identified?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.RM-06
            Description: >
              A standardized method for calculating, documenting, categorizing, and prioritizing
              cybersecurity risks is established and communicated. Consistency in risk assessment
              methodology ensures that risks are comparable, that nothing is overlooked, and that
              prioritization decisions are defensible and transparent.
            Implementation_Guidance: >
              Adopt a risk scoring methodology (e.g., qualitative, semi-quantitative, or
              FAIR-based). Document the methodology in the Risk Assessment Policy. Train all
              risk assessors on the method. Use a consistent risk register format organization-wide.
            Key_Questions:
              - "Is there a single, documented risk assessment methodology in use?"
              - "Are all risk assessors trained on the standard methodology?"
              - "Is the risk register reviewed and updated on a defined schedule?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RM-07
            Description: >
              Strategic opportunities (i.e., positive risks) are characterized and are included
              in organizational cybersecurity risk discussions. Positive risks are potential
              beneficial outcomes — e.g., implementing a new technology that reduces threat
              surface. Including them in risk discussions ensures the organization doesn't
              only focus on threats but also leverages opportunities for improvement.
            Implementation_Guidance: >
              Explicitly include a "positive risk" or "opportunity" section in risk assessment
              templates. During risk reviews, ask teams to identify potential cybersecurity
              improvements alongside threats. Incorporate opportunity assessments into the
              annual security planning cycle.
            Key_Questions:
              - "Are potential cybersecurity improvements treated as positive risks and documented?"
              - "Do risk discussions include both threat and opportunity analysis?"
              - "Are opportunities for capability improvement captured in the risk register?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

      - Title: "Govern: Roles, Responsibilities, and Authorities (GV.RR)"
        category_description: >
          Ensures that cybersecurity accountability is clearly assigned at all levels of the
          organization — from the board and C-suite to individual employees. When roles and
          responsibilities are undefined, critical tasks fall through the cracks. This category
          also ensures cybersecurity is embedded into HR practices and organizational culture.
        Subparts:

          - ID: GV.RR-01
            Description: >
              Organizational leadership is responsible and accountable for cybersecurity risk
              and fosters a culture that is risk-aware, ethical, and continually improving.
              Leadership must model good cybersecurity behavior and set expectations from the top.
              A culture of cybersecurity awareness reduces human error — one of the leading causes
              of security incidents.
            Implementation_Guidance: >
              Ensure the board and C-suite receive regular cybersecurity briefings. Document
              executive-level cybersecurity responsibilities. Include cybersecurity culture
              expectations in leadership performance reviews. Sponsor security awareness programs
              from the executive level.
            Key_Questions:
              - "Does the board receive regular cybersecurity risk briefings?"
              - "Are executive-level cybersecurity responsibilities formally documented?"
              - "Is cybersecurity performance part of leadership evaluations?"
            Policies:
              - Acceptable Use of Information Technology Resource Policy
              - Information Security Policy
              - Security Awareness and Training Policy

          - ID: GV.RR-02
            Description: >
              Roles, responsibilities, and authorities related to cybersecurity risk management
              are established, communicated, understood, and enforced. Every person who has a
              role in cybersecurity — from the CISO to the help desk — must know what they are
              responsible for, what authority they have, and how they will be held accountable.
            Implementation_Guidance: >
              Create a cybersecurity RACI (Responsible, Accountable, Consulted, Informed) matrix.
              Include cybersecurity responsibilities in job descriptions. Communicate roles during
              onboarding and reinforce through annual training. Enforce accountability through
              policy and performance management.
            Key_Questions:
              - "Is there a RACI or similar document mapping cybersecurity responsibilities?"
              - "Are cybersecurity roles included in job descriptions and onboarding?"
              - "Is there a process to enforce accountability when responsibilities are not met?"
            Policies:
              - Acceptable Use of Information Technology Resource Policy
              - Information Security Policy
              - Security Awareness and Training Policy

          - ID: GV.RR-03
            Description: >
              Adequate resources are allocated commensurate with the cybersecurity risk strategy,
              roles, responsibilities, and policies. Without sufficient budget, staffing, and tooling,
              even the best policies cannot be executed. This subcategory ensures that resource
              allocation decisions are driven by documented risk priorities.
            Implementation_Guidance: >
              Document resource requirements for each cybersecurity role and control. Present
              resource gap analysis to leadership annually. Tie budget requests to specific risk
              reduction outcomes. Track resource allocation vs. plan throughout the year.
            Key_Questions:
              - "Is there a documented cybersecurity budget tied to identified risks?"
              - "Are staffing levels adequate for the defined responsibilities?"
              - "Is there a process to request additional resources when new risks emerge?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.RR-04
            Description: >
              Cybersecurity is included in human resources practices. This includes background
              checks, security training at onboarding, role-based access provisioning, and
              offboarding procedures that revoke access. HR and IT/security must work together
              to manage the employee lifecycle from a cybersecurity perspective.
            Implementation_Guidance: >
              Integrate cybersecurity checks into hiring, onboarding, role change, and termination
              workflows. Ensure HR and IT/security teams have documented handoff procedures.
              Include security responsibilities in all employment contracts and acceptable use policies.
            Key_Questions:
              - "Are background checks performed for roles with privileged access?"
              - "Is there a formal offboarding process that includes immediate access revocation?"
              - "Do employment contracts include cybersecurity obligations?"
            Policies:
              - Information Security Policy
              - Personnel Security Policy
              - Physical and Environmental Protection Policy
              - Security Awareness and Training Policy

      - Title: "Govern: Policy (GV.PO)"
        category_description: >
          Covers the creation, communication, enforcement, and lifecycle management of cybersecurity
          policies. Policies are the formal expression of an organization's security requirements
          and expectations. They must be living documents — regularly reviewed and updated to
          reflect changes in threats, technology, regulations, and organizational needs.
        Subparts:

          - ID: GV.PO-01
            Description: >
              Policy for managing cybersecurity risks is established based on organizational context,
              cybersecurity strategy, and priorities, and is communicated and enforced. A cybersecurity
              policy is only effective if it is grounded in the organization's real risk environment,
              aligned with its strategy, and actively enforced — not just written and filed away.
            Implementation_Guidance: >
              Develop policies that reference the organizational risk assessment findings and
              strategic objectives. Publish policies in an accessible location for all employees.
              Define enforcement mechanisms and consequences for non-compliance. Assign policy
              owners who are accountable for enforcement.
            Key_Questions:
              - "Are all cybersecurity policies derived from a risk assessment?"
              - "Are policies accessible to all relevant employees?"
              - "Is there a documented enforcement process with defined consequences?"
            Policies:
              - Personnel Security Policy
              - Physical and Environmental Protection Policy
              - Security Awareness and Training Policy

          - ID: GV.PO-02
            Description: >
              Policy for managing cybersecurity risks is reviewed, updated, communicated, and
              enforced to reflect changes in requirements, threats, technology, and organizational
              mission. Outdated policies create false confidence and compliance gaps. A structured
              policy review cycle ensures policies remain relevant and effective.
            Implementation_Guidance: >
              Establish an annual policy review cycle. Trigger ad-hoc reviews after significant
              incidents, regulatory changes, or major technology changes. Use a policy version
              control system. Require employees to re-acknowledge updated policies.
            Key_Questions:
              - "Is there a documented policy review and update cycle?"
              - "Are policies reviewed after significant incidents or regulatory changes?"
              - "Is there a version history for each policy document?"
            Policies:
              - Personnel Security Policy
              - Physical and Environmental Protection Policy
              - Security Awareness and Training Policy

      - Title: "Govern: Oversight (GV.OV)"
        category_description: >
          Ensures that the cybersecurity risk management strategy is continuously monitored for
          effectiveness and adjusted as needed. Oversight functions provide the feedback loop
          that makes cybersecurity governance dynamic rather than static. Leadership must be
          engaged in reviewing outcomes and directing adjustments.
        Subparts:

          - ID: GV.OV-01
            Description: >
              Cybersecurity risk management strategy outcomes are reviewed to inform and adjust
              strategy and direction. Reviewing outcomes — such as the number of incidents,
              audit findings, or compliance gaps — provides evidence of whether the current
              strategy is working and where it needs to evolve.
            Implementation_Guidance: >
              Establish a formal strategy review process with defined metrics (KPIs/KRIs).
              Present outcomes to senior leadership on a quarterly basis. Document strategy
              adjustments made as a result of outcome reviews.
            Key_Questions:
              - "Are cybersecurity strategy outcomes formally measured and reviewed?"
              - "What metrics are used to evaluate strategy effectiveness?"
              - "Is there a documented process for adjusting strategy based on outcomes?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.OV-02
            Description: >
              The cybersecurity risk management strategy is reviewed and adjusted to ensure
              coverage of organizational requirements and risks. As the organization grows,
              acquires new systems, or enters new markets, the risk landscape changes. The
              strategy must be updated to maintain full coverage.
            Implementation_Guidance: >
              Conduct a coverage gap analysis during each annual strategy review. Map the strategy
              against the current risk register and compliance requirements. Update strategy
              documentation when gaps are identified.
            Key_Questions:
              - "Is there a coverage gap analysis conducted annually?"
              - "Does the strategy account for newly acquired systems or services?"
              - "Are emerging threats incorporated into the strategy review?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

          - ID: GV.OV-03
            Description: >
              Organizational cybersecurity risk management performance is evaluated and reviewed
              for adjustments needed. Performance evaluation goes beyond strategy — it looks at
              how well the organization executes its cybersecurity program day-to-day and identifies
              operational improvements.
            Implementation_Guidance: >
              Define performance metrics for key cybersecurity processes (e.g., mean time to
              detect, patch compliance rate, training completion rate). Review metrics in regular
              security governance meetings. Use findings to drive continuous improvement initiatives.
            Key_Questions:
              - "Are there defined performance metrics for the cybersecurity program?"
              - "How are underperforming areas identified and addressed?"
              - "Is performance data used to drive resource and priority decisions?"
            Policies:
              - Information Security Policy
              - Information Security Risk Management Standard
              - Risk Assessment Policy

      - Title: "Govern: Cybersecurity Supply Chain Risk Management (GV.SC)"
        category_description: >
          Addresses risks introduced by suppliers, vendors, and third-party service providers.
          Supply chain attacks have become one of the most significant cybersecurity threats —
          organizations must understand, assess, and actively manage the risks that third parties
          introduce into their environments. This includes everything from software vendors to
          cloud providers to managed service providers.
        Subparts:

          - ID: GV.SC-01
            Description: >
              A cybersecurity supply chain risk management (C-SCRM) program, strategy, objectives,
              policies, and processes are established and agreed to by organizational stakeholders.
              A formal C-SCRM program provides the structure needed to consistently assess and
              manage third-party risk across the organization.
            Implementation_Guidance: >
              Develop a C-SCRM policy and program charter. Define objectives aligned with the
              organization's risk appetite. Gain executive sponsorship. Integrate C-SCRM into
              the broader risk management program.
            Key_Questions:
              - "Is there a formal, documented C-SCRM program?"
              - "Does leadership understand and support the C-SCRM objectives?"
              - "Are C-SCRM processes integrated with procurement and vendor management?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-02
            Description: >
              Cybersecurity roles and responsibilities for suppliers, customers, and partners are
              established, communicated, and coordinated internally and externally. All parties
              in the supply chain must understand their cybersecurity obligations. Ambiguity in
              third-party responsibilities is a common source of security gaps.
            Implementation_Guidance: >
              Define cybersecurity responsibilities in all vendor and partner contracts. Assign
              internal owners for each third-party relationship. Include third-party cybersecurity
              requirements in onboarding materials. Coordinate with external parties during
              incident response.
            Key_Questions:
              - "Are third-party cybersecurity responsibilities included in contracts?"
              - "Is there an internal owner assigned for each significant vendor relationship?"
              - "Do vendors know how to report a cybersecurity incident to your organization?"
            Policies:
              - Acceptable Use of Information Technology Resource Policy
              - Information Security Policy
              - Security Awareness and Training Policy

          - ID: GV.SC-03
            Description: >
              Cybersecurity supply chain risk management is integrated into cybersecurity and
              enterprise risk management, risk assessment, and improvement processes. Third-party
              risks must appear in the enterprise risk register and be assessed using the same
              standards as internal risks. Integration prevents blind spots.
            Implementation_Guidance: >
              Include vendor/supplier risks in the enterprise risk register. Conduct third-party
              risk assessments using the organization's standard risk methodology. Include
              supply chain risks in risk review meetings.
            Key_Questions:
              - "Are third-party risks tracked in the enterprise risk register?"
              - "Is the same risk methodology applied to supply chain risks as internal risks?"
              - "Are supply chain risk findings included in governance reporting?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-04
            Description: >
              Suppliers are known and prioritized by criticality. Not all suppliers pose equal
              risk. Those with access to sensitive data, critical systems, or the ability to
              affect service availability must be identified and prioritized for more rigorous
              oversight.
            Implementation_Guidance: >
              Maintain a complete supplier inventory. Score each supplier by criticality factors
              (data access, system integration, service dependency, regulatory relevance).
              Apply tiered oversight based on criticality score.
            Key_Questions:
              - "Is there a complete and current inventory of all suppliers?"
              - "Are suppliers classified by criticality or risk tier?"
              - "Does oversight intensity match supplier criticality?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-05
            Description: >
              Requirements to address cybersecurity risks in supply chains are established,
              prioritized, and integrated into contracts and other types of agreements with
              suppliers and other relevant third parties. Contractual cybersecurity requirements
              are one of the most effective mechanisms for managing third-party risk — they create
              legally enforceable obligations.
            Implementation_Guidance: >
              Develop standard cybersecurity contract clauses (e.g., right-to-audit, breach
              notification timelines, data protection requirements, minimum security standards).
              Have legal and security review all new contracts. Ensure contract requirements
              are proportional to the supplier's criticality.
            Key_Questions:
              - "Are cybersecurity requirements included in all vendor contracts?"
              - "Do contracts require breach notification within a defined timeframe?"
              - "Is there a right-to-audit clause for high-criticality suppliers?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-06
            Description: >
              Planning and due diligence are performed to reduce risks before entering into
              formal supplier or other third-party relationships. Pre-engagement due diligence
              prevents the organization from inadvertently introducing new cybersecurity risks
              by onboarding insecure or untrustworthy suppliers.
            Implementation_Guidance: >
              Define a pre-engagement due diligence process for all new suppliers above a defined
              risk threshold. Use security questionnaires (e.g., SIG, CAIQ) and review certifications
              (e.g., SOC 2, ISO 27001). Document and retain due diligence findings.
            Key_Questions:
              - "Is there a formal pre-engagement security assessment process for new vendors?"
              - "Are security certifications or questionnaires required before onboarding?"
              - "Are due diligence findings documented and retained?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-07
            Description: >
              The risks posed by a supplier, their products and services, and other third parties
              are understood, recorded, prioritized, assessed, responded to, and monitored over
              the course of the relationship. Risk management doesn't end at onboarding — it
              must be ongoing throughout the entire lifecycle of the vendor relationship.
            Implementation_Guidance: >
              Establish periodic reassessment cycles for all suppliers (e.g., annually for critical,
              biannually for others). Monitor for changes in supplier posture (e.g., breaches, ownership
              changes, certification lapses). Update the supplier risk register after each assessment.
            Key_Questions:
              - "Are supplier risk assessments repeated on a regular cycle?"
              - "Is there a process to respond when a supplier's security posture deteriorates?"
              - "Are risk findings tracked and remediated over the course of the relationship?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-08
            Description: >
              Relevant suppliers and other third parties are included in incident planning,
              response, and recovery activities. Incidents often cross organizational boundaries —
              a supplier may be the source of a breach or may be needed to help contain and
              recover from one. Third parties must be part of incident plans.
            Implementation_Guidance: >
              Identify which suppliers are relevant to incident scenarios. Include third-party
              contact information and response roles in incident response plans. Conduct tabletop
              exercises that include third-party participants. Define notification and coordination
              procedures for supplier-involved incidents.
            Key_Questions:
              - "Are relevant suppliers named in incident response plans?"
              - "Have joint incident response exercises been conducted with key suppliers?"
              - "Is there a defined process for notifying and coordinating with suppliers during an incident?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-09
            Description: >
              Supply chain security practices are integrated into cybersecurity and enterprise
              risk management programs, and their performance is monitored throughout the
              technology product and service life cycle. Security must be considered at every
              stage — from product selection through deployment, operation, and decommissioning.
            Implementation_Guidance: >
              Include security criteria in procurement and product selection processes. Monitor
              supplier security performance metrics. Integrate supply chain security reviews into
              the system development and acquisition lifecycle. Track and report on supply chain
              security KPIs.
            Key_Questions:
              - "Are security requirements included in product/service procurement criteria?"
              - "Is supply chain security monitored throughout the product lifecycle?"
              - "Are supply chain security performance metrics reported to leadership?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

          - ID: GV.SC-10
            Description: >
              Cybersecurity supply chain risk management plans include provisions for activities
              that occur after the conclusion of a partnership or service agreement. Offboarding
              a supplier carries real risk — data may remain in their systems, access may not be
              revoked, and institutional knowledge may be lost. Exit procedures must address
              these risks systematically.
            Implementation_Guidance: >
              Define a supplier offboarding checklist covering: data return or destruction,
              access revocation, key rotation, contract archive, and knowledge transfer.
              Include exit provisions in all supplier contracts. Test offboarding procedures
              periodically.
            Key_Questions:
              - "Is there a formal supplier offboarding process?"
              - "Are data return/destruction requirements included in contracts?"
              - "Is access revocation for terminated suppliers verified and documented?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

  - NIST_Function: Identify
    function_description: >
      The IDENTIFY function helps organizations develop an understanding of their cybersecurity
      risk to systems, assets, data, and capabilities. This function is the foundation for
      effective risk management — you cannot protect what you don't know exists. It covers
      asset management, risk assessment, and continuous improvement.
    Subheadings:

      - Title: "Identify: Asset Management (ID.AM)"
        category_description: >
          Focuses on knowing what the organization owns and operates — hardware, software, data,
          services, and network flows. An accurate, up-to-date asset inventory is a prerequisite
          for nearly every other cybersecurity control. You cannot patch, monitor, or protect
          assets you don't know exist.
        Subparts:

          - ID: ID.AM-1
            Description: >
              Inventories of hardware managed by the organization are maintained. This includes
              all physical devices: servers, workstations, laptops, network devices, printers,
              IoT devices, and mobile devices. An accurate hardware inventory enables asset-based
              security controls and supports incident response and vulnerability management.
            Implementation_Guidance: >
              Use automated discovery tools to build and maintain the hardware inventory.
              Integrate with CMDB or ITSM platforms. Include asset owner, location, classification,
              and lifecycle status. Review and reconcile the inventory quarterly.
            Key_Questions:
              - "Is there an automated process for discovering and inventorying hardware?"
              - "Does the inventory include asset owner, classification, and location?"
              - "How often is the hardware inventory reviewed and reconciled?"
            Policies:
              - Acceptable Use of Information Technology Resource Policy
              - Access Control Policy
              - Account Management/Access Control Standard
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy

          - ID: ID.AM-2
            Description: >
              Inventories of software, services, and systems managed by the organization are
              maintained. This includes operating systems, applications, SaaS tools, APIs, and
              cloud services. Software inventory is essential for patch management, license
              compliance, and identifying unauthorized or vulnerable software.
            Implementation_Guidance: >
              Deploy software asset management (SAM) tools. Include cloud services and SaaS
              subscriptions in the inventory. Tag each entry with business owner, version, and
              patch status. Integrate with vulnerability management workflows.
            Key_Questions:
              - "Does the software inventory include cloud and SaaS applications?"
              - "Is the software inventory used to drive patch management activities?"
              - "How is unauthorized software detected and handled?"
            Policies:
              - Acceptable Use of Information Technology Resource Policy
              - Access Control Policy
              - Account Management/Access Control Standard
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy

          - ID: ID.AM-3
            Description: >
              Representations of the organization's authorized network communication and internal
              and external network data flows are maintained. Network flow documentation helps
              identify unauthorized communication, supports firewall rule management, and is
              essential for incident response and network segmentation decisions.
            Implementation_Guidance: >
              Create and maintain network diagrams showing all authorized communication paths.
              Use network flow analysis tools to identify and document data flows. Review and
              update diagrams after any significant network change.
            Key_Questions:
              - "Are network diagrams current and reviewed regularly?"
              - "Are authorized vs. unauthorized network flows documented?"
              - "Is there a process to update network documentation after changes?"
            Policies:
              - System and Communications Protection Policy

          - ID: ID.AM-4
            Description: >
              Inventories of services provided by suppliers are maintained. Organizations often
              rely on dozens of external services — cloud providers, managed service providers,
              SaaS vendors, etc. Maintaining an inventory of these services enables oversight,
              risk assessment, and continuity planning.
            Implementation_Guidance: >
              Maintain a supplier service catalog alongside the hardware and software inventory.
              Include the type of data shared, access levels granted, and criticality rating for
              each service. Review during contract renewals and annual risk assessments.
            Key_Questions:
              - "Is there an inventory of all externally provided services?"
              - "Does the inventory note the data shared with each external service?"
              - "Is the supplier service inventory linked to the C-SCRM program?"
            Policies:
              - System and Communications Protection Policy

          - ID: ID.AM-5
            Description: >
              Assets are prioritized based on classification, criticality, resources, and impact
              on the mission. Not all assets require the same level of protection. Prioritization
              ensures that the most critical and sensitive assets receive the strongest controls
              and the most attention during incidents.
            Implementation_Guidance: >
              Apply an asset classification framework (e.g., Critical, High, Medium, Low) based
              on data sensitivity, operational dependency, and regulatory requirements. Use
              classification to drive control selection and incident response prioritization.
            Key_Questions:
              - "Is there a documented asset classification scheme?"
              - "Are classification labels applied consistently across the asset inventory?"
              - "Does asset classification influence which controls are applied?"
            Policies:
              - Information Classification Standard

          - ID: ID.AM-7
            Description: >
              Inventories of data and corresponding metadata for designated data types are
              maintained. Data is often the most valuable asset an organization holds. Knowing
              where sensitive data lives — including what type, where stored, who has access,
              and how long it is retained — is essential for data protection and privacy compliance.
            Implementation_Guidance: >
              Conduct a data discovery exercise to identify and classify sensitive data types
              (PII, PHI, financial, intellectual property). Document metadata including owner,
              location, retention schedule, and access controls. Integrate with data loss
              prevention (DLP) and privacy management tools.
            Key_Questions:
              - "Has a data discovery exercise been conducted recently?"
              - "Are data types classified and their locations documented?"
              - "Is there a data retention schedule that is actively enforced?"
            Policies:
              - Information Classification Standard
              - Information Security Policy

          - ID: ID.AM-8
            Description: >
              Systems, hardware, software, services, and data are managed throughout their life
              cycles. Assets introduce risk at every stage — acquisition, deployment, operation,
              change, and disposal. Lifecycle management ensures security controls are maintained
              at every stage and that outdated or decommissioned assets don't become liabilities.
            Implementation_Guidance: >
              Integrate security requirements into procurement, deployment, change management,
              and decommissioning processes. Use the Sanitization/Secure Disposal Standard when
              retiring assets. Apply the Secure System Development Life Cycle Standard for
              software development.
            Key_Questions:
              - "Are security requirements included in asset procurement criteria?"
              - "Is there a secure disposal process for retired hardware and data?"
              - "Are decommissioned assets removed from inventories and access control lists?"
            Policies:
              - Access Control Policy
              - Account Management/Access Control Standard
              - Configuration Management Policy
              - Identification and Authentication Policy
              - Sanitization Secure Disposal Standard
              - Secure Configuration Standard
              - Secure System Development Life Cycle Standard
              - Maintenance Policy
              - Remote Access Standard
              - Security Logging Standard

      - Title: "Identify: Risk Assessment (ID.RA)"
        category_description: >
          Defines how the organization identifies, analyzes, and prioritizes cybersecurity risks.
          A robust risk assessment process considers threats, vulnerabilities, likelihoods, and
          impacts — and feeds directly into risk response decisions. Regular risk assessments
          keep the organization's understanding of its risk posture current.
        Subparts:

          - ID: ID.RA-01
            Description: >
              Vulnerabilities in assets are identified, validated, and recorded. Vulnerability
              management is a continuous process — new vulnerabilities are discovered daily.
              Organizations must have a systematic way to find, confirm, document, and track
              vulnerabilities across their asset inventory.
            Implementation_Guidance: >
              Deploy vulnerability scanning tools and run scans on a defined schedule (e.g.,
              weekly for internet-facing assets, monthly for internal). Validate findings to
              eliminate false positives. Record all confirmed vulnerabilities in a tracking
              system with assigned owners and remediation deadlines.
            Key_Questions:
              - "How frequently are vulnerability scans conducted across all asset types?"
              - "Is there a process to validate and prioritize scan findings?"
              - "Are vulnerabilities tracked to closure with assigned owners?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: ID.RA-02
            Description: >
              Cyber threat intelligence is received from information sharing forums and sources.
              Threat intelligence provides awareness of current and emerging threats relevant
              to the organization's industry, geography, and technology stack. It enables
              proactive rather than purely reactive security.
            Implementation_Guidance: >
              Subscribe to relevant threat intelligence feeds (e.g., MS-ISAC, US-CERT, ISAC for
              your sector). Designate a team member to review and act on intelligence. Integrate
              threat feeds into SIEM and vulnerability management tools. Participate in information
              sharing communities.
            Key_Questions:
              - "What threat intelligence sources does the organization currently use?"
              - "Is threat intelligence acted upon in a timely manner?"
              - "Are threat feeds integrated into security monitoring tools?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: ID.RA-03
            Description: >
              Internal and external threats to the organization are identified and recorded.
              Threats come from many directions — external attackers, malicious insiders,
              natural disasters, and human error. Maintaining awareness of the full threat
              landscape enables more comprehensive risk assessment.
            Implementation_Guidance: >
              Conduct a threat identification exercise as part of the annual risk assessment.
              Use threat modeling techniques (e.g., STRIDE, PASTA) for critical systems.
              Document identified threats in the risk register with likelihood and relevance ratings.
            Key_Questions:
              - "Is there a documented list of identified internal and external threats?"
              - "Are insider threats explicitly considered in the risk assessment?"
              - "Is the threat list reviewed and updated regularly?"
            Policies:
              - Encryption Standard
              - Information Security Policy
              - Maintenance Policy
              - Media Protection Policy
              - Mobile Device Security
              - Security Assessment and Authorization Policy
              - Vulnerability Scanning Standard
              - Patch Management Standard

          - ID: ID.RA-04
            Description: >
              Potential impacts and likelihoods of threats exploiting vulnerabilities are
              identified and recorded. Combining threat and vulnerability information with
              likelihood and impact estimates produces a risk score that can be used to
              prioritize response efforts. This step transforms raw findings into actionable risk data.
            Implementation_Guidance: >
              Use the organization's standard risk scoring methodology to assign likelihood and
              impact ratings to each threat-vulnerability pair. Document the rationale for each
              rating. Produce a risk heat map or prioritized risk register for review.
            Key_Questions:
              - "Are likelihood and impact ratings assigned to all identified risks?"
              - "Is the rationale for risk scores documented?"
              - "Is a risk heat map or prioritized list presented to decision-makers?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: ID.RA-05
            Description: >
              Threats, vulnerabilities, likelihoods, and impacts are used to understand inherent
              risk and inform risk response prioritization. This subcategory ensures that risk
              assessment outputs directly drive what gets fixed first. Without this step,
              remediation efforts may focus on the easiest or most visible issues rather than
              the most impactful ones.
            Implementation_Guidance: >
              Create a prioritized remediation plan based on inherent risk scores. Align
              remediation priorities with business criticality. Review and update priorities
              after each assessment cycle or significant threat change.
            Key_Questions:
              - "Is there a documented, risk-driven remediation priority list?"
              - "Are the highest-risk items being addressed first?"
              - "How often is the prioritization list reviewed and updated?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Information Security Policy

          - ID: ID.RA-06
            Description: >
              Risk responses are chosen, prioritized, planned, tracked, and communicated.
              Identifying risk is only half the battle — the organization must also decide
              how to respond (mitigate, transfer, accept, avoid), plan the response, assign
              ownership, track progress, and keep stakeholders informed.
            Implementation_Guidance: >
              For each risk in the register, document the chosen response, responsible owner,
              planned actions, timeline, and current status. Report risk response progress
              to leadership in regular governance meetings. Use a risk treatment plan template.
            Key_Questions:
              - "Is a risk response documented for every identified risk?"
              - "Are risk owners assigned and accountable for treatment progress?"
              - "Is risk treatment status reported to leadership regularly?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Information Security Policy

          - ID: ID.RA-07
            Description: >
              Changes and exceptions are managed, assessed for risk impact, recorded, and tracked.
              Every change to the environment — new systems, configuration changes, software
              updates, exceptions to policy — carries potential risk. Change management processes
              ensure risks are assessed before changes are implemented.
            Implementation_Guidance: >
              Integrate security risk assessment into the change management process. Require
              a risk impact assessment for all significant changes. Document all exceptions to
              policy with justification, approver, and expiration date. Track exceptions for
              regular review and remediation.
            Key_Questions:
              - "Is there a security review step in the change management process?"
              - "Are all policy exceptions documented with an expiration date?"
              - "Are open exceptions reviewed regularly for closure or renewal?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Planning Policy

          - ID: ID.RA-08
            Description: >
              Processes for receiving, analyzing, and responding to vulnerability disclosures
              are established. Vulnerability disclosures can come from internal staff, external
              researchers, vendors, or automated feeds. Having a defined process ensures that
              disclosures are handled promptly and consistently, reducing the window of exposure.
            Implementation_Guidance: >
              Establish a vulnerability disclosure process and communicate it to relevant teams.
              Define SLAs for response by severity. Consider establishing a coordinated vulnerability
              disclosure (CVD) or bug bounty program for externally facing systems. Log all
              disclosures and responses.
            Key_Questions:
              - "Is there a documented process for receiving and responding to vulnerability disclosures?"
              - "Are response SLAs defined by vulnerability severity?"
              - "Are all disclosures logged and tracked to resolution?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Information Security Policy

          - ID: ID.RA-09
            Description: >
              Authenticity and integrity of hardware and software are assessed prior to
              acquisition and use. Counterfeit or tampered hardware and software can introduce
              backdoors, malware, or unreliable behavior. Verifying authenticity before deployment
              is a critical supply chain security control.
            Implementation_Guidance: >
              Require cryptographic verification (hashes, signatures) of software before
              installation. Acquire hardware only from authorized vendors and distributors.
              Implement a process to verify the integrity of software packages in CI/CD pipelines.
            Key_Questions:
              - "Is software integrity verified via hash or signature before installation?"
              - "Are hardware purchases restricted to authorized vendors?"
              - "Is there a process for detecting tampered or counterfeit components?"
            Policies:
              - System and Information Integrity Policy

          - ID: ID.RA-10
            Description: >
              Critical suppliers are assessed prior to acquisition. Before entering into a
              significant supplier relationship, the organization should evaluate the supplier's
              cybersecurity posture. This prevents the introduction of high-risk third parties
              into the supply chain.
            Implementation_Guidance: >
              Define "critical supplier" criteria. Require security questionnaires, certifications
              (SOC 2, ISO 27001), or independent assessments for critical suppliers before
              contract signing. Document and retain pre-acquisition assessment findings.
            Key_Questions:
              - "Is there a definition of what constitutes a 'critical supplier'?"
              - "Are pre-acquisition security assessments required for critical suppliers?"
              - "Are assessment findings documented and considered in supplier selection decisions?"
            Policies:
              - Identification and Authentication Policy
              - Security Assessment and Authorization Policy
              - Systems and Services Acquisition Policy

      - Title: "Identify: Improvement (ID.IM)"
        category_description: >
          Focuses on the organization's ability to learn from evaluations, incidents, exercises,
          and operational experience and use those lessons to continuously improve its cybersecurity
          posture. Continuous improvement prevents the organization from repeating mistakes and
          ensures the cybersecurity program keeps pace with evolving threats and business needs.
        Subparts:

          - ID: ID.IM-01
            Description: >
              Improvements are identified from evaluations. Evaluations — including audits,
              assessments, penetration tests, and compliance reviews — generate findings that
              should directly feed into improvement plans. Without a formal process to act on
              evaluation findings, the same issues will recur.
            Implementation_Guidance: >
              For every evaluation, produce a findings report and a corresponding improvement
              plan with owners and deadlines. Track improvement actions to closure. Report on
              improvement progress in governance meetings.
            Key_Questions:
              - "Is there a process to convert evaluation findings into tracked improvement actions?"
              - "Are improvement plans produced after every audit or assessment?"
              - "Are improvement actions tracked to closure and reported to leadership?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: ID.IM-02
            Description: >
              Improvements are identified from security tests and exercises, including those
              done in coordination with suppliers and relevant third parties. Tabletop exercises,
              red team exercises, and drills reveal gaps in plans, procedures, and capabilities
              that may not be apparent during normal operations.
            Implementation_Guidance: >
              Conduct security exercises (tabletops, drills, red team/blue team) on a defined
              schedule. Include relevant suppliers in exercises where applicable. Document all
              lessons learned and convert them to actionable improvements. Retest after
              improvements are implemented.
            Key_Questions:
              - "How often are security exercises conducted?"
              - "Are lessons learned documented and acted upon after each exercise?"
              - "Are third parties included in exercises when they are relevant to the scenario?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: ID.IM-03
            Description: >
              Improvements are identified from execution of operational processes, procedures,
              and activities. Day-to-day operations surface inefficiencies, gaps, and risks
              that formal assessments may miss. Operational staff should have a channel to
              report process improvement opportunities.
            Implementation_Guidance: >
              Create a formal mechanism for operational staff to report process improvement
              suggestions. Incorporate operational feedback into the annual security program review.
              Treat recurring operational issues as signals for systemic improvement.
            Key_Questions:
              - "Is there a mechanism for operational staff to report process improvements?"
              - "Are recurring operational issues tracked and addressed systematically?"
              - "Are operational insights incorporated into the annual program review?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: ID.IM-04
            Description: >
              Incident response plans and other cybersecurity plans that affect operations are
              established, communicated, maintained, and improved. Plans that are out-of-date,
              untested, or unknown to relevant staff provide false assurance. This subcategory
              ensures all operational cybersecurity plans are living documents that reflect
              current reality.
            Implementation_Guidance: >
              Review and update all operational cybersecurity plans (incident response, business
              continuity, disaster recovery) at least annually and after any significant incident
              or organizational change. Communicate plan updates to all stakeholders. Maintain
              version control and document revision history.
            Key_Questions:
              - "Are incident response and continuity plans reviewed and updated annually?"
              - "Are plan updates communicated to all relevant staff?"
              - "Is there a version control system for cybersecurity plans?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Systems and Services Acquisition Policy
              - Contingency Planning Policy

  - NIST_Function: Protect
    function_description: >
      The PROTECT function implements safeguards to ensure delivery of critical infrastructure
      services and to limit or contain the impact of a potential cybersecurity event. It covers
      identity and access management, awareness and training, data security, platform security,
      and technology infrastructure resilience. Protective controls are the organization's
      primary line of defense.
    Subheadings:

      - Title: "Protect: Identity Management and Access Control (PR.AA)"
        category_description: >
          Manages who has access to what within the organization. Effective identity and access
          management (IAM) ensures that only authorized individuals and systems can access
          sensitive resources, and that access is commensurate with business need. The principle
          of least privilege — giving users only the access they need — is central to this category.
        Subparts:

          - ID: PR.AA-01
            Description: >
              Identities and credentials for authorized users, services, and hardware are managed
              by the organization. This includes the full lifecycle of identities: creation,
              modification, review, and deletion. Unmanaged credentials — stale accounts,
              shared passwords, default credentials — are among the most exploited vulnerabilities.
            Implementation_Guidance: >
              Implement an Identity Governance and Administration (IGA) tool or process.
              Conduct periodic access reviews (at least quarterly for privileged access).
              Automate account deprovisioning upon employee departure. Eliminate default,
              shared, and service accounts without individual accountability.
            Key_Questions:
              - "Is there a formal process for provisioning and deprovisioning user accounts?"
              - "Are access reviews conducted periodically for all user types?"
              - "Are default credentials changed on all systems before deployment?"
            Policies:
              - Access Control Policy
              - Account Management/Access Control Standard
              - Configuration Management Policy
              - Identification and Authentication Policy
              - Sanitization Secure Disposal Standard
              - Secure Configuration Standard
              - Secure System Development Life Cycle Standard

          - ID: PR.AA-02
            Description: >
              Identities are proofed and bound to credentials based on the context of interactions.
              Identity proofing ensures that the person claiming an identity is who they say they
              are. Strong credential binding — linking credentials to a verified identity — prevents
              credential theft and impersonation attacks.
            Implementation_Guidance: >
              Implement identity proofing processes appropriate to the risk level (e.g., in-person
              verification for privileged accounts). Bind credentials to devices or biometrics
              where appropriate. Use phishing-resistant MFA for high-risk access contexts.
            Key_Questions:
              - "Is identity proofing performed before issuing high-privilege credentials?"
              - "Are credentials bound to specific devices or biometrics where required?"
              - "Is phishing-resistant MFA deployed for privileged and remote access?"
            Policies:
              - Access Control Policy
              - Account Management/Access Control Standard
              - Authentication Tokens Standard
              - Configuration Management Policy
              - Identification and Authentication Policy

          - ID: PR.AA-03
            Description: >
              Users, services, and hardware are authenticated. Authentication verifies that
              the entity requesting access is who or what it claims to be. Strong authentication
              — particularly multi-factor authentication (MFA) — dramatically reduces the risk
              of unauthorized access through compromised credentials.
            Implementation_Guidance: >
              Require MFA for all remote access, privileged accounts, and access to sensitive systems.
              Implement certificate-based authentication for service-to-service and device authentication.
              Disable single-factor authentication for high-risk access paths.
            Key_Questions:
              - "Is MFA enforced for remote access and privileged accounts?"
              - "Are services and APIs authenticated using strong methods?"
              - "Is single-factor authentication being phased out for sensitive access?"
            Policies:
              - Remote Access Standard

          - ID: PR.AA-04
            Description: >
              Identity assertions are protected, conveyed, and verified. When one system passes
              identity information to another (e.g., via SAML, OAuth, Kerberos), those assertions
              must be cryptographically protected and verified. Weak identity assertion handling
              enables impersonation and session hijacking.
            Implementation_Guidance: >
              Use industry-standard protocols (SAML 2.0, OAuth 2.0, OpenID Connect) for identity
              federation. Sign and validate all identity assertions. Implement token expiration
              and revocation mechanisms. Audit identity assertion logs for anomalies.
            Key_Questions:
              - "Are identity assertions cryptographically signed and validated?"
              - "Are industry-standard federation protocols in use?"
              - "Is there monitoring for identity assertion anomalies?"
            Policies:
              - Access Control Policy
              - Account Management/Access Control Standard
              - Authentication Tokens Standard
              - Configuration Management Policy
              - Identification and Authentication Policy

          - ID: PR.AA-05
            Description: >
              Access permissions, entitlements, and authorizations are defined in a policy,
              managed, enforced, and reviewed, and incorporate the principles of least privilege
              and separation of duties. Least privilege limits the blast radius of a compromised
              account. Separation of duties prevents any single individual from having unchecked
              control over critical processes.
            Implementation_Guidance: >
              Implement role-based access control (RBAC) aligned to job functions. Enforce
              least privilege by default. Define and enforce separation of duties for sensitive
              functions (e.g., no single person can both approve and execute a financial
              transaction). Review and recertify access entitlements quarterly.
            Key_Questions:
              - "Is role-based access control implemented organization-wide?"
              - "Are separation of duties controls applied for critical functions?"
              - "Are access entitlements reviewed and recertified on a regular schedule?"
            Policies:
              - Access Control Policy
              - Account Management/Access Control Standard
              - Configuration Management Policy
              - Identification and Authentication Policy
              - Sanitization Secure Disposal Standard
              - Secure Configuration Standard
              - Secure System Development Life Cycle Standard
              - Remote Access Standard

          - ID: PR.AA-06
            Description: >
              Physical access to assets is managed, monitored, and enforced commensurate with
              risk. Physical security is a prerequisite for logical security — an attacker with
              physical access can bypass most software controls. Data centers, server rooms,
              network closets, and areas where sensitive data is handled must have appropriate
              physical access controls.
            Implementation_Guidance: >
              Implement physical access controls (badge readers, locks, biometrics) for sensitive
              areas. Maintain access logs and review them regularly. Escort visitors in restricted
              areas. Conduct regular physical security audits.
            Key_Questions:
              - "Are sensitive areas protected with appropriate physical access controls?"
              - "Are physical access logs maintained and reviewed regularly?"
              - "Is there a process for managing visitor access to restricted areas?"
            Policies:
              - Encryption Standard
              - Information Security Policy
              - Maintenance Policy
              - Media Protection Policy
              - Mobile Device Security
              - System and Communications Protection Policy

      - Title: "Protect: Awareness and Training (PR.AT)"
        category_description: >
          Ensures that all personnel — from general employees to specialized security staff —
          have the knowledge and skills needed to support the organization's cybersecurity posture.
          Human error is consistently cited as the leading cause of security incidents.
          Effective training reduces this risk and creates a security-conscious culture.
        Subparts:

          - ID: PR.AT-01
            Description: >
              Personnel are provided with awareness and training so that they possess the knowledge
              and skills to perform general tasks with cybersecurity risks in mind. General
              security awareness training helps all employees recognize phishing, social engineering,
              and risky behaviors — and know how to respond. It is the foundation of a security
              culture.
            Implementation_Guidance: >
              Deliver security awareness training to all staff at least annually, with targeted
              reminders throughout the year (e.g., phishing simulations, security newsletters).
              Cover topics including phishing, password hygiene, data handling, incident reporting,
              and social engineering. Track completion and follow up with non-completers.
            Key_Questions:
              - "Is security awareness training delivered to 100% of staff annually?"
              - "Are phishing simulations conducted and used to target follow-up training?"
              - "Is training content updated to reflect current threats?"
            Policies:
              - Information Security Policy
              - Personnel Security Policy
              - Physical and Environmental Protection Policy
              - Security Awareness and Training Policy
              - Acceptable Use of Information Technology Resource Policy

          - ID: PR.AT-02
            Description: >
              Individuals in specialized roles are provided with awareness and training so that
              they possess the knowledge and skills to perform relevant tasks with cybersecurity
              risks in mind. IT administrators, developers, security analysts, and other technical
              staff need role-specific training that goes beyond general awareness — covering
              topics like secure coding, privilege management, incident handling, and secure
              configuration.
            Implementation_Guidance: >
              Identify specialized roles with heightened security responsibilities. Develop
              or procure role-specific training curricula. Track role-specific training completion
              separately from general awareness. Require specialized training as part of
              onboarding for security and IT roles. Fund ongoing professional development
              (certifications, conferences, advanced training).
            Key_Questions:
              - "Is role-specific cybersecurity training provided to IT and security staff?"
              - "Are there minimum training requirements for privileged account holders?"
              - "Is training completion tracked by role and reported to management?"
            Policies:
              - Information Security Policy
              - Personnel Security Policy
              - Physical and Environmental Protection Policy
              - Security Awareness and Training Policy
              - Access Control Policy
              - Account Management/Access Control Standard
              - Authentication Tokens Standard
              - Configuration Management Policy
              - Identification and Authentication Policy
              - Acceptable Use of Information Technology Resource Policy

      - Title: "Protect: Data Security (PR.DS)"
        category_description: >
          Covers the protection of data throughout its lifecycle — at rest, in transit, and in use.
          Data is often the organization's most valuable and most targeted asset. Effective data
          security combines encryption, access controls, media management, and data loss prevention
          to protect confidentiality, integrity, and availability.
        Subparts:

          - ID: PR.DS-01
            Description: >
              The confidentiality, integrity, and availability of data-at-rest are protected.
              Data at rest — stored on disks, databases, backups, and removable media — must be
              protected against unauthorized access, tampering, and loss. Encryption is the
              primary control for protecting data at rest.
            Implementation_Guidance: >
              Encrypt all sensitive data at rest using strong, current encryption standards
              (e.g., AES-256). Apply encryption to databases, file shares, laptops, removable
              media, and cloud storage. Implement access controls to restrict who can access
              decryption keys. Back up data and verify backup integrity regularly.
            Key_Questions:
              - "Is sensitive data encrypted at rest across all storage locations?"
              - "Are encryption keys managed securely and separately from the data they protect?"
              - "Are backup files encrypted and their integrity verified?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Encryption Standard
              - Incident Response Policy
              - Information Security Policy
              - Maintenance Policy
              - Media Protection Policy
              - Mobile Device Security
              - Patch Management Standard

          - ID: PR.DS-02
            Description: >
              The confidentiality, integrity, and availability of data-in-transit are protected.
              Data moving across networks — including internal networks, the internet, and
              third-party connections — is vulnerable to interception and tampering. Encryption
              in transit protects data from these threats.
            Implementation_Guidance: >
              Enforce TLS 1.2 or higher for all data in transit. Disable legacy protocols (SSLv3,
              TLS 1.0/1.1). Implement certificate management to prevent expired certificate
              issues. Use VPNs or secure channels for sensitive remote access. Monitor for
              unencrypted data transmission.
            Key_Questions:
              - "Is TLS enforced for all network communications involving sensitive data?"
              - "Are legacy encryption protocols disabled across the environment?"
              - "Is there monitoring for unencrypted transmission of sensitive data?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Encryption Standard
              - Incident Response Policy
              - Information Security Policy
              - Maintenance Policy
              - Media Protection Policy
              - Mobile Device Security
              - Patch Management Standard

          - ID: PR.DS-10
            Description: >
              The confidentiality, integrity, and availability of data-in-use are protected.
              Data in use — being processed in memory or actively accessed by applications —
              is harder to protect than data at rest or in transit but is increasingly targeted.
              Controls include memory protection, secure enclaves, and application-level access
              controls.
            Implementation_Guidance: >
              Implement application-level access controls to restrict what data each component
              can access. Use secure development practices to prevent memory injection attacks.
              Consider confidential computing technologies for highly sensitive workloads.
              Apply DLP controls to monitor and restrict sensitive data usage.
            Key_Questions:
              - "Are there controls to limit what data each application component can access in memory?"
              - "Is sensitive data masked or tokenized before being used in non-production environments?"
              - "Are DLP tools in place to detect and prevent unauthorized data access or exfiltration?"
            Policies:
              - Sanitization Secure Disposal Standard
              - Secure Configuration Standard
              - Secure System Development Life Cycle Standard
              - Maintenance Policy
              - Media Protection Policy
              - Mobile Device Security

          - ID: PR.DS-11
            Description: >
              Backups of data are created, protected, maintained, and tested. Reliable, tested
              backups are the last line of defense against ransomware, data corruption, and
              accidental deletion. Backups that have never been tested are an unknown quantity
              — they may not work when needed most.
            Implementation_Guidance: >
              Follow the 3-2-1 backup rule (3 copies, 2 different media types, 1 offsite).
              Encrypt all backups. Test backup restoration at least quarterly. Store a copy
              offline or air-gapped to protect against ransomware. Define and enforce retention
              schedules.
            Key_Questions:
              - "Does the backup strategy follow the 3-2-1 rule or equivalent?"
              - "Are backup restoration tests conducted at least quarterly?"
              - "Is at least one backup copy stored offline or air-gapped?"
            Policies:
              - Maintenance Policy
              - Media Protection Policy

      - Title: "Protect: Platform Security (PR.PS)"
        category_description: >
          Addresses the security of the platforms — operating systems, applications, and
          development environments — that the organization operates. Secure configuration,
          patch management, software lifecycle management, and log generation are the core
          practices in this category.
        Subparts:

          - ID: PR.PS-01
            Description: >
              Configuration management practices are established and applied. Secure baseline
              configurations reduce the attack surface of every system. Unmanaged configurations
              drift over time, introducing vulnerabilities. A robust configuration management
              program ensures systems are deployed securely and remain secure over time.
            Implementation_Guidance: >
              Develop secure baseline configurations for all system types (servers, workstations,
              network devices, cloud resources). Use industry benchmarks (e.g., CIS Benchmarks)
              as a starting point. Enforce configurations via Group Policy, MDM, or infrastructure-as-code.
              Monitor for configuration drift.
            Key_Questions:
              - "Are there documented secure baseline configurations for all system types?"
              - "Are CIS Benchmarks or equivalent used as the baseline standard?"
              - "Is configuration drift monitored and automatically remediated where possible?"
            Policies:
              - Configuration Management Policy

          - ID: PR.PS-02
            Description: >
              Software is maintained, replaced, and removed commensurate with risk. Outdated,
              unsupported, or unnecessary software is one of the most common attack vectors.
              A disciplined software lifecycle management process ensures vulnerabilities are
              patched, end-of-life software is replaced, and unnecessary software is removed.
            Implementation_Guidance: >
              Maintain a software inventory with patch status and end-of-life dates. Implement
              a patch management process with defined SLAs by severity. Plan replacements for
              end-of-life software well before support ends. Remove software that is not actively
              used or needed.
            Key_Questions:
              - "Is there a patch management process with defined SLAs?"
              - "Is end-of-life software tracked and replacement planned proactively?"
              - "Is unused software regularly identified and removed?"
            Policies:
              - Maintenance Policy

          - ID: PR.PS-03
            Description: >
              Hardware is maintained, replaced, and removed commensurate with risk. Just as
              software can become a liability when it ages, hardware that is outdated, out of
              vendor support, or decommissioned must be managed carefully to prevent security
              risks — including data exposure from improper disposal.
            Implementation_Guidance: >
              Track hardware lifecycle in the asset inventory. Plan hardware refresh cycles
              for end-of-life equipment. Apply the Sanitization/Secure Disposal Standard when
              retiring hardware. Remove retired hardware from the network and all inventories.
            Key_Questions:
              - "Is there a hardware lifecycle management process?"
              - "Is the Sanitization/Secure Disposal Standard applied to all retired hardware?"
              - "Is retired hardware removed from network access and inventories promptly?"
            Policies:
              - Sanitization Secure Disposal Standard
              - Access Control Policy

          - ID: PR.PS-04
            Description: >
              Log records are generated and made available for continuous monitoring. Logs are
              the evidentiary foundation of security monitoring, incident response, and forensic
              investigation. Systems that don't generate logs — or whose logs aren't collected —
              create blind spots in the security program.
            Implementation_Guidance: >
              Define logging requirements for all system types. Ensure logs include sufficient
              detail (timestamps, user IDs, actions, source/destination). Forward logs to a
              centralized log management or SIEM platform. Define log retention periods aligned
              with regulatory requirements.
            Key_Questions:
              - "Are logging requirements defined for all system types?"
              - "Are logs forwarded to a centralized platform for analysis?"
              - "Do log retention periods meet regulatory and forensic requirements?"
            Policies:
              - Identification and Authentication Policy

          - ID: PR.PS-05
            Description: >
              Installation and execution of unauthorized software are prevented. Unauthorized
              software — whether introduced maliciously or through shadow IT — can introduce
              malware, create vulnerabilities, or violate licenses. Application whitelisting and
              software restriction policies are the primary controls.
            Implementation_Guidance: >
              Implement application whitelisting or allowlisting on endpoints. Use endpoint
              detection and response (EDR) tools to detect and block unauthorized execution.
              Define and communicate the approved software list. Establish a process for
              requesting approval for new software.
            Key_Questions:
              - "Is application whitelisting or allowlisting implemented on endpoints?"
              - "Is there a process to request and approve new software?"
              - "Are EDR tools in place to detect unauthorized software execution?"
            Policies:
              - Configuration Management Policy
              - Secure Configuration Standard

          - ID: PR.PS-06
            Description: >
              Secure software development practices are integrated, and their performance is
              monitored throughout the software development life cycle (SDLC). Vulnerabilities
              introduced during development are far cheaper to fix than those found in production.
              Integrating security into the SDLC — also called DevSecOps — makes software more
              secure by default.
            Implementation_Guidance: >
              Integrate security requirements into the SDLC from the design phase. Use static
              application security testing (SAST), dynamic application security testing (DAST),
              and software composition analysis (SCA) tools in CI/CD pipelines. Conduct security
              code reviews and threat modeling. Train developers on secure coding practices.
            Key_Questions:
              - "Is security integrated into every phase of the SDLC?"
              - "Are SAST/DAST/SCA tools used in the CI/CD pipeline?"
              - "Are developers trained on secure coding practices?"
            Policies:
              - Sanitization Secure Disposal Standard

      - Title: "Protect: Technology Infrastructure Resilience (PR.IR)"
        category_description: >
          Ensures that the organization's technology infrastructure can withstand and recover
          from adverse events — whether cyberattacks, hardware failures, or natural disasters.
          Resilience goes beyond prevention; it ensures the organization can continue operating
          even under adverse conditions.
        Subparts:

          - ID: PR.IR-01
            Description: >
              Networks and environments are protected from unauthorized logical access and usage.
              Network segmentation, remote access controls, and wireless security prevent
              attackers from moving laterally through the environment or accessing sensitive
              systems from unauthorized locations.
            Implementation_Guidance: >
              Implement network segmentation to isolate sensitive systems and environments
              (e.g., OT/ICS, PCI, development vs. production). Enforce VPN with MFA for all
              remote access. Implement network access control (NAC) to prevent unauthorized
              device connections. Monitor for unauthorized network access attempts.
            Key_Questions:
              - "Is the network segmented to isolate sensitive systems and environments?"
              - "Is VPN with MFA required for all remote access?"
              - "Is there monitoring for unauthorized access attempts on the network?"
            Policies:
              - Remote Access Standard
              - Mobile Device Security
              - Encryption Standard
              - Media Protection Policy
              - System and Communications Protection Policy

          - ID: PR.IR-02
            Description: >
              The organization's technology assets are protected from environmental threats.
              Physical threats — fire, flood, power failure, extreme temperatures — can destroy
              infrastructure and cause data loss. Environmental controls in data centers and
              server rooms protect against these non-cyber threats.
            Implementation_Guidance: >
              Implement environmental controls in facilities housing critical infrastructure
              (temperature/humidity monitoring, fire suppression, water detection, UPS systems).
              Conduct regular facility inspections. Ensure business continuity plans address
              environmental disaster scenarios.
            Key_Questions:
              - "Are environmental controls in place in all facilities housing critical systems?"
              - "Are environmental systems monitored with alerts for out-of-range conditions?"
              - "Do business continuity plans address environmental disaster scenarios?"
            Policies:
              - Secure Configuration Standard
              - Secure System Development Life Cycle Standard
              - Sanitization Secure Disposal Standard
              - Maintenance Policy

          - ID: PR.IR-03
            Description: >
              Mechanisms are implemented to achieve resilience requirements in normal and adverse
              situations. Resilience mechanisms — redundancy, failover, load balancing, and
              fault tolerance — ensure that critical services can continue even when individual
              components fail.
            Implementation_Guidance: >
              Define availability requirements (RTO/RPO) for all critical systems. Implement
              redundancy and failover for systems that require high availability. Test failover
              mechanisms regularly. Include resilience requirements in the SDLC and infrastructure
              design processes.
            Key_Questions:
              - "Are RTO and RPO defined for all critical systems?"
              - "Are failover and redundancy mechanisms tested regularly?"
              - "Are resilience requirements included in system design and procurement criteria?"
            Policies:
              - Secure System Development Life Cycle Standard
              - System and Information Integrity Policy
              - 802.11 Wireless Network Security Standard

          - ID: PR.IR-04
            Description: >
              Adequate resource capacity to ensure availability is maintained. Even with the
              best security controls, systems that are resource-constrained — insufficient CPU,
              memory, network bandwidth, or storage — can become unavailable during peak demand
              or under attack (e.g., DDoS). Capacity planning is a core availability control.
            Implementation_Guidance: >
              Monitor resource utilization continuously. Perform capacity planning at least
              annually. Set alerts for resource utilization thresholds. Plan for elastic or
              cloud-based capacity for variable workloads. Include DoS/DDoS mitigation in
              network architecture.
            Key_Questions:
              - "Is resource utilization monitored continuously with defined thresholds?"
              - "Is capacity planning performed annually and before major events?"
              - "Is there a DDoS mitigation capability for internet-facing services?"
            Policies:
              - System and Information Integrity Policy

  - NIST_Function: Detect
    function_description: >
      The DETECT function enables timely discovery of cybersecurity events. Even with strong
      protective controls, some threats will get through. Detection capabilities ensure the
      organization knows when something has gone wrong, enabling a rapid response before
      damage escalates. The faster an incident is detected, the lower its potential impact.
    Subheadings:

      - Title: "Detect: Adverse Event Analysis (DE.AE)"
        category_description: >
          Covers the processes and capabilities for analyzing potential security events to
          determine whether they represent genuine threats. Raw security events must be
          correlated, contextualized with threat intelligence, and assessed to distinguish
          false positives from real incidents. Effective analysis reduces alert fatigue and
          ensures genuine incidents are identified quickly.
        Subparts:

          - ID: DE.AE-02
            Description: >
              Potentially adverse events are analyzed to better understand associated activities.
              Security events — alerts, log entries, anomalies — must be investigated to determine
              what happened, what systems were affected, and whether the event is benign or
              malicious. Without analysis, organizations cannot distinguish noise from signal.
            Implementation_Guidance: >
              Implement a SIEM or log analysis platform to aggregate and correlate events.
              Define analysis playbooks for common event types. Ensure analysts have the tools
              and skills to investigate complex events. Track mean time to analyze (MTTA) as
              a performance metric.
            Key_Questions:
              - "Is there a SIEM or equivalent platform for event analysis?"
              - "Are analysis playbooks defined for common event scenarios?"
              - "Is MTTA tracked and used to improve the analysis process?"
            Policies:
              - Auditing and Accountability Standard
              - Secure Coding Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.AE-03
            Description: >
              Information is correlated from multiple sources. A single event in isolation may
              appear benign, but when correlated with events from other sources — network logs,
              endpoint telemetry, authentication logs, threat intelligence — it may reveal a
              significant attack. Multi-source correlation is essential for detecting sophisticated
              threats.
            Implementation_Guidance: >
              Ensure all relevant log sources are feeding into the SIEM. Define correlation rules
              that span multiple data sources. Tune correlation rules regularly to reduce false
              positives. Consider threat hunting as a complement to automated correlation.
            Key_Questions:
              - "Are logs from all relevant sources (network, endpoint, cloud, application) in the SIEM?"
              - "Are cross-source correlation rules defined and regularly tuned?"
              - "Is threat hunting conducted to identify threats that bypass automated detection?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.AE-04
            Description: >
              The estimated impact and scope of adverse events are understood. When a potential
              incident is identified, analysts must quickly assess how widespread it is and what
              the potential business impact could be. This assessment drives escalation decisions
              and informs the scale of the response.
            Implementation_Guidance: >
              Develop impact assessment criteria for common incident types. Train analysts to
              make rapid preliminary impact estimates. Include scope and impact assessment as
              a required step in all investigation playbooks. Use impact estimates to drive
              escalation thresholds.
            Key_Questions:
              - "Are there defined criteria for assessing the scope and impact of adverse events?"
              - "Is impact assessment a required step in all investigation playbooks?"
              - "Are impact estimates used to drive escalation decisions?"
            Policies:
              - Auditing and Accountability Standard
              - System and Information Integrity Policy

          - ID: DE.AE-06
            Description: >
              Information on adverse events is provided to authorized staff and tools. Timely
              distribution of event information to the right people and systems enables faster
              response. Analysts, incident responders, system owners, and automated response
              tools must all receive relevant event data when it is needed.
            Implementation_Guidance: >
              Define roles and notification criteria for adverse event information. Integrate
              SIEM alerts with ticketing and incident management tools. Implement automated
              notifications for high-severity events. Ensure event information is classified
              and shared only with authorized recipients.
            Key_Questions:
              - "Are high-severity event alerts automatically routed to the right teams?"
              - "Is event information integrated with incident management workflows?"
              - "Are access controls in place to ensure event data is only shared with authorized staff?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: DE.AE-07
            Description: >
              Cyber threat intelligence and other contextual information are integrated into
              the analysis. Threat intelligence enriches raw event data with context —
              information about known attacker TTPs, malicious IPs/domains, and relevant
              campaigns. This context dramatically improves the accuracy and speed of analysis.
            Implementation_Guidance: >
              Integrate threat intelligence feeds (STIX/TAXII, ISAC feeds, commercial feeds)
              into the SIEM and analysis tooling. Use intelligence to tune detection rules.
              Train analysts to use intelligence platforms (e.g., MISP, ThreatConnect).
              Contribute intelligence back to sharing communities.
            Key_Questions:
              - "Are threat intelligence feeds integrated into the SIEM?"
              - "Are detection rules tuned using current threat intelligence?"
              - "Is the organization contributing intelligence to sharing communities?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.AE-08
            Description: >
              Incidents are declared when adverse events meet the defined incident criteria.
              Not every adverse event is an incident. Clear, pre-defined criteria for declaring
              an incident ensure that the incident response process is triggered consistently
              and at the right threshold — neither too early (wasting resources) nor too late
              (allowing damage to grow).
            Implementation_Guidance: >
              Define incident declaration criteria in the Incident Response Policy. Include
              criteria for different incident types (data breach, ransomware, DDoS, etc.).
              Train analysts on when and how to declare an incident. Ensure incident declaration
              triggers the formal incident response process immediately.
            Key_Questions:
              - "Are incident declaration criteria formally documented?"
              - "Do analysts know when and how to officially declare an incident?"
              - "Does incident declaration automatically trigger the incident response process?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

      - Title: "Detect: Continuous Monitoring (DE.CM)"
        category_description: >
          Covers the ongoing surveillance of networks, systems, personnel activity, and third-party
          services to detect adverse events. Continuous monitoring turns security from a point-in-time
          activity into an ongoing practice. The goal is to shrink the time between when a threat
          actor acts and when the organization detects it.
        Subparts:

          - ID: DE.CM-01
            Description: >
              Networks and network services are monitored to find potentially adverse events.
              Network monitoring detects unusual traffic patterns, unauthorized connections,
              data exfiltration, and lateral movement. It is one of the most effective ways
              to detect sophisticated attacks that have bypassed endpoint controls.
            Implementation_Guidance: >
              Deploy network detection and response (NDR) or IDS/IPS tools at key network
              segments. Monitor DNS, NetFlow, and proxy logs for suspicious activity.
              Establish network baselines and alert on deviations. Ensure monitoring covers
              cloud and hybrid network environments.
            Key_Questions:
              - "Are IDS/IPS or NDR tools deployed across key network segments?"
              - "Are DNS and proxy logs monitored for malicious indicators?"
              - "Does monitoring coverage extend to cloud and hybrid environments?"
            Policies:
              - Maintenance Policy
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.CM-02
            Description: >
              The physical environment is monitored to find potentially adverse events. Physical
              security monitoring — CCTV, access logs, environmental sensors — can detect
              unauthorized physical access attempts, environmental hazards, and insider threats
              that purely digital monitoring would miss.
            Implementation_Guidance: >
              Deploy CCTV in sensitive areas and regularly review footage. Monitor physical
              access logs and alert on anomalies (e.g., after-hours access). Install environmental
              sensors (temperature, smoke, water) with automated alerting. Integrate physical
              security monitoring with the security operations center where possible.
            Key_Questions:
              - "Are CCTV and access logs monitored for anomalies?"
              - "Are environmental sensors deployed in critical facilities?"
              - "Is physical security monitoring integrated with the SOC or security team?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.CM-03
            Description: >
              Personnel activity and technology usage are monitored to find potentially adverse
              events. Insider threats — whether malicious or accidental — can cause significant
              harm. Monitoring user activity on sensitive systems, detecting unusual access
              patterns, and flagging policy violations helps identify and respond to insider
              threats.
            Implementation_Guidance: >
              Implement user and entity behavior analytics (UEBA) to detect anomalous activity.
              Define baselines for normal user behavior. Monitor privileged user activity with
              enhanced logging. Ensure monitoring is conducted transparently and in accordance
              with applicable privacy laws and employee agreements.
            Key_Questions:
              - "Is user activity monitoring in place for privileged accounts?"
              - "Are UEBA tools used to detect anomalous behavior patterns?"
              - "Is monitoring conducted in compliance with applicable privacy laws?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.CM-06
            Description: >
              External service provider activities and services are monitored to find potentially
              adverse events. Third-party providers with access to the organization's systems
              or data can be vectors for attack. Monitoring their activity ensures that
              third-party access is used appropriately and that anomalies are detected quickly.
            Implementation_Guidance: >
              Require service providers to generate and retain logs of their activities on
              organizational systems. Monitor third-party access sessions using privileged
              access management (PAM) tools. Review service provider activity logs regularly.
              Define KPIs/SLAs for service provider security performance.
            Key_Questions:
              - "Are third-party access sessions logged and monitored?"
              - "Are PAM tools used to record and review privileged third-party sessions?"
              - "Is third-party security performance measured against defined SLAs?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy
              - Vulnerability Scanning Standard

          - ID: DE.CM-09
            Description: >
              Computing hardware and software, runtime environments, and their data are monitored
              to find potentially adverse events. Endpoint monitoring — covering workstations,
              servers, virtual machines, containers, and cloud instances — provides visibility
              into what is happening on every system in the environment.
            Implementation_Guidance: >
              Deploy endpoint detection and response (EDR) tools across all endpoints.
              Monitor container and cloud workload runtime environments. Integrate endpoint
              telemetry into the SIEM. Define and alert on suspicious execution patterns
              (e.g., unusual process spawning, memory injection, privilege escalation).
            Key_Questions:
              - "Is EDR deployed across all endpoints including cloud and container workloads?"
              - "Is endpoint telemetry integrated into the SIEM?"
              - "Are detection rules in place for common attack techniques (MITRE ATT&CK)?"
            Policies:
              - Auditing and Accountability Standard
              - Security Logging Standard
              - System and Information Integrity Policy

  - NIST_Function: Respond
    function_description: >
      The RESPOND function supports the ability to contain the impact of a detected cybersecurity
      incident. A fast, organized, and well-practiced response limits damage, reduces recovery
      time, and preserves evidence. This function covers incident management, communication,
      analysis, and mitigation.
    Subheadings:

      - Title: "Respond: Incident Management (RS.MA)"
        category_description: >
          Covers the execution and management of the incident response process from the moment
          an incident is declared through to its resolution. Effective incident management
          requires a well-defined, well-practiced plan, clear roles, and disciplined execution
          under pressure.
        Subparts:

          - ID: RS.MA-01
            Description: >
              The incident response plan is executed in coordination with relevant third parties
              once an incident is declared. Incidents rarely respect organizational boundaries.
              Coordinating with third parties — suppliers, law enforcement, ISACs, legal counsel,
              cyber insurers — from the start ensures a more effective and legally sound response.
            Implementation_Guidance: >
              Identify relevant third parties for common incident scenarios before an incident occurs.
              Include third-party contact information and roles in the incident response plan.
              Establish pre-incident relationships with law enforcement and cyber insurers.
              Conduct exercises that include third-party participants.
            Key_Questions:
              - "Are relevant third parties identified and included in the incident response plan?"
              - "Is there a pre-established relationship with law enforcement for cyber incidents?"
              - "Have joint exercises been conducted with key third parties?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: RS.MA-02
            Description: >
              Incident reports are triaged and validated. Not every reported event is a confirmed
              incident. Triage involves quickly assessing reported events to validate whether
              an incident has actually occurred, what type it is, and how urgent the response
              needs to be.
            Implementation_Guidance: >
              Define a triage process with clear criteria for validating incidents. Use a
              standardized incident intake form. Set response time targets for initial triage
              by incident severity. Train first responders on rapid triage techniques.
            Key_Questions:
              - "Is there a documented triage process for validating incident reports?"
              - "Are response time targets defined for initial triage by severity?"
              - "Are first responders trained on triage techniques?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: RS.MA-03
            Description: >
              Incidents are categorized and prioritized. After validation, incidents must be
              categorized (e.g., data breach, ransomware, DDoS, insider threat) and prioritized
              based on their severity and potential impact. Consistent categorization enables
              better resource allocation, communication, and post-incident analysis.
            Implementation_Guidance: >
              Define an incident taxonomy aligned with regulatory reporting requirements and
              industry standards (e.g., VERIS). Define severity levels (e.g., P1-P4) with
              clear criteria. Map severity levels to response SLAs and escalation paths.
            Key_Questions:
              - "Is there a defined incident taxonomy for categorization?"
              - "Are severity levels defined with clear criteria and response SLAs?"
              - "Is categorization consistent and used for post-incident trend analysis?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: RS.MA-04
            Description: >
              Incidents are escalated or elevated as needed. As incidents evolve and their
              scope or impact becomes clearer, they may need to be escalated to senior leadership,
              the board, legal counsel, regulators, or law enforcement. Clear escalation criteria
              and paths prevent delays in getting the right decision-makers involved.
            Implementation_Guidance: >
              Define escalation triggers and paths in the incident response plan. Include
              escalation criteria for regulatory notification, executive briefing, and law
              enforcement engagement. Test escalation paths in tabletop exercises.
            Key_Questions:
              - "Are escalation triggers and paths documented in the incident response plan?"
              - "Do all responders know when and how to escalate an incident?"
              - "Are escalation paths tested in exercises?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: RS.MA-05
            Description: >
              The criteria for initiating incident recovery are applied. Moving from response
              to recovery too early can re-introduce threats. Moving too late prolongs downtime.
              Clear, pre-defined criteria for when it is safe to begin recovery operations
              prevent both premature and delayed recoveries.
            Implementation_Guidance: >
              Define recovery initiation criteria for each major incident type (e.g., threat
              actor confirmed removed, all affected systems identified, forensic preservation
              complete). Document criteria in the incident response plan. Require an explicit
              go/no-go decision by the incident commander before recovery begins.
            Key_Questions:
              - "Are recovery initiation criteria documented for each major incident type?"
              - "Is there an explicit go/no-go decision process before recovery begins?"
              - "Is the threat confirmed removed before recovery operations start?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

      - Title: "Respond: Incident Response Reporting and Communication (RS.CO)"
        category_description: >
          Covers how information about incidents is communicated to internal and external stakeholders.
          Effective communication during an incident maintains trust, meets regulatory obligations,
          and ensures everyone who needs to act has the information they need. Poor communication
          can compound the damage of an incident.
        Subparts:

          - ID: RS.CO-02
            Description: >
              Internal and external stakeholders are notified of incidents. Timely notification
              of the right stakeholders — employees, executives, customers, regulators, law
              enforcement — is both a legal requirement in many cases and a matter of good
              governance. Delayed or incomplete notification compounds the reputational and
              legal impact of an incident.
            Implementation_Guidance: >
              Define notification requirements and timelines for each stakeholder type.
              Identify applicable breach notification laws and their deadlines (e.g., 72 hours
              for GDPR). Pre-approve communication templates for common incident scenarios.
              Designate a communications lead for incidents.
            Key_Questions:
              - "Are notification requirements and timelines documented for each stakeholder type?"
              - "Are pre-approved communication templates available for common incident scenarios?"
              - "Is there a designated communications lead for incident response?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RS.CO-03
            Description: >
              Information is shared with designated internal and external stakeholders as defined
              in the response plan. Beyond notifications, ongoing information sharing during an
              incident keeps all parties informed of progress, containment status, and expected
              resolution timelines. Consistent messaging prevents rumor and confusion.
            Implementation_Guidance: >
              Define information sharing protocols in the incident response plan. Establish
              regular status update cadences for different stakeholder groups. Use a single
              source of truth for incident status (e.g., incident management platform).
              Ensure information is shared on a need-to-know basis.
            Key_Questions:
              - "Are information sharing protocols documented in the response plan?"
              - "Is there a defined cadence for status updates to different stakeholders?"
              - "Is a single source of truth maintained for incident status?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

      - Title: "Respond: Incident Analysis (RS.AN)"
        category_description: >
          Covers the detailed analysis performed during and after an incident to understand what
          happened, how it happened, what was affected, and what the root cause was. Thorough
          analysis informs both immediate response decisions and long-term improvements to
          prevent recurrence.
        Subparts:

          - ID: RS.AN-03
            Description: >
              Analysis is performed to establish what has taken place during an incident and
              the root cause of the incident. Understanding root cause is essential for preventing
              recurrence. Surface-level fixes that don't address root cause allow the same
              vulnerability to be exploited again.
            Implementation_Guidance: >
              Conduct root cause analysis (RCA) for all significant incidents. Use structured
              RCA techniques (5 Whys, fishbone diagram). Document findings in a post-incident
              report. Ensure RCA findings drive remediation actions, not just timeline reconstruction.
            Key_Questions:
              - "Is a root cause analysis conducted for all significant incidents?"
              - "Are structured RCA techniques used to ensure thorough analysis?"
              - "Do RCA findings drive remediation actions?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RS.AN-06
            Description: >
              Actions performed during an investigation are recorded, and the records' integrity
              and provenance are preserved. Investigation records are both an operational necessity
              and potentially legal evidence. Records must be complete, accurate, and maintained
              in a way that ensures their integrity cannot be questioned.
            Implementation_Guidance: >
              Require investigators to document all actions taken during an investigation,
              including timestamps, tools used, and findings. Store investigation records in
              a tamper-evident system. Maintain a chain of custody for digital evidence.
              Brief investigators on evidence handling requirements.
            Key_Questions:
              - "Are all investigation actions documented with timestamps?"
              - "Are investigation records stored in a tamper-evident system?"
              - "Is a chain of custody maintained for digital evidence?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RS.AN-07
            Description: >
              Incident data and metadata are collected, and their integrity and provenance are
              preserved. The data collected during an incident — logs, memory dumps, disk images,
              network captures — is the foundation of forensic analysis and potential legal
              proceedings. Its integrity must be protected from the moment of collection.
            Implementation_Guidance: >
              Follow established digital forensics practices for evidence collection (write blockers,
              cryptographic hashing). Use forensic-grade tools for data acquisition. Document
              the collection process and chain of custody. Store evidence in a secure, access-controlled
              location.
            Key_Questions:
              - "Are forensic data collection procedures documented and followed?"
              - "Is cryptographic hashing used to verify the integrity of collected evidence?"
              - "Is evidence stored securely with access controls and audit logs?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RS.AN-08
            Description: >
              An incident's magnitude is estimated and validated. Understanding the full scope
              of an incident — how many systems were affected, what data was accessed or exfiltrated,
              what business processes were disrupted — is necessary for both response prioritization
              and regulatory reporting.
            Implementation_Guidance: >
              Include magnitude assessment as a required step in the investigation process.
              Use asset inventories and data classification to assess the scope of impact.
              Validate initial magnitude estimates as more evidence is gathered. Document
              final magnitude determination in the post-incident report.
            Key_Questions:
              - "Is magnitude assessment a required step in the investigation process?"
              - "Are initial estimates validated and refined as investigation progresses?"
              - "Is final magnitude documented in the post-incident report?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

      - Title: "Respond: Incident Mitigation (RS.MI)"
        category_description: >
          Covers the actions taken to contain and eradicate the threat during an active incident.
          Effective mitigation stops the threat from causing further damage and removes it from
          the environment — setting the stage for recovery.
        Subparts:

          - ID: RS.MI-01
            Description: >
              Incidents are contained. Containment stops the spread of the incident and prevents
              additional damage while analysis and eradication are underway. The appropriate
              containment strategy depends on the incident type — from network isolation to
              account suspension to disabling specific services.
            Implementation_Guidance: >
              Define containment strategies for common incident types in advance (playbooks).
              Ensure responders have the authority and technical capability to implement
              containment quickly. Document all containment actions taken and their timestamps.
              Balance containment urgency with the need to preserve evidence.
            Key_Questions:
              - "Are containment playbooks defined for common incident types?"
              - "Do responders have authority to implement containment without delays?"
              - "Is evidence preservation considered alongside containment actions?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RS.MI-02
            Description: >
              Incidents are eradicated. After containment, the threat must be completely removed
              from the environment. Incomplete eradication — leaving behind backdoors, persistent
              malware, or compromised credentials — allows attackers to return, often quickly
              and more aggressively.
            Implementation_Guidance: >
              Define eradication procedures for common threat types (malware removal, account
              remediation, vulnerability patching, configuration correction). Verify eradication
              through scanning and monitoring before beginning recovery. Document all eradication
              actions.
            Key_Questions:
              - "Are eradication procedures defined for common threat types?"
              - "Is eradication verified through scanning before recovery begins?"
              - "Are all affected accounts, credentials, and access paths reviewed during eradication?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

  - NIST_Function: Recover
    function_description: >
      The RECOVER function supports timely restoration of normal operations to reduce the impact
      of a cybersecurity incident. Recovery is not just about restoring systems — it's about
      restoring trust, documenting lessons learned, and ensuring the organization emerges from
      an incident stronger than before. Recovery includes plan execution, communication, and
      post-incident improvement.
    Subheadings:

      - Title: "Recover: Incident Recovery Plan Execution (RC.RP)"
        category_description: >
          Covers the execution of the recovery phase of the incident response plan — restoring
          systems, data, and services after an incident has been contained and eradicated.
          Recovery must be systematic, prioritized, and verified to ensure that restored systems
          are clean and fully functional.
        Subparts:

          - ID: RC.RP-01
            Description: >
              The recovery portion of the incident response plan is executed once initiated
              from the incident response process. Recovery begins only after the threat has
              been eradicated and the recovery initiation criteria have been met. A structured
              recovery process prevents premature restoration that could re-introduce threats.
            Implementation_Guidance: >
              Document the recovery phase as a distinct section of the incident response plan.
              Define the handoff point from response to recovery. Ensure recovery teams are
              briefed and ready before the transition. Use a recovery checklist to ensure
              no steps are missed.
            Key_Questions:
              - "Is recovery documented as a distinct phase in the incident response plan?"
              - "Is there a formal handoff from the response phase to the recovery phase?"
              - "Are recovery teams briefed and ready before recovery begins?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RC.RP-02
            Description: >
              Recovery actions are selected, scoped, prioritized, and performed. Not all systems
              need to be recovered simultaneously. Recovery actions should be prioritized based
              on business criticality — recovering the most essential services first to minimize
              operational impact.
            Implementation_Guidance: >
              Define recovery priorities based on business impact analysis (BIA) findings.
              Document recovery procedures for each priority tier. Assign recovery teams to
              each tier. Track recovery progress against the plan and report status to leadership.
            Key_Questions:
              - "Are recovery priorities based on documented business impact analysis?"
              - "Are recovery procedures documented for each system tier?"
              - "Is recovery progress tracked and reported to stakeholders?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RC.RP-03
            Description: >
              The integrity of backups and other restoration assets is verified before using
              them for restoration. Restoring from a compromised or corrupted backup can
              reintroduce the very threat the organization is trying to recover from. Backup
              integrity must be verified before use.
            Implementation_Guidance: >
              Test backup integrity verification procedures as part of regular backup testing.
              During incident recovery, scan restoration assets for malware before use.
              Verify file hashes against pre-incident baselines where possible.
              Prefer known-clean backups taken before the incident began.
            Key_Questions:
              - "Is backup integrity verified before restoration during incident recovery?"
              - "Are restoration assets scanned for malware before use?"
              - "Are pre-incident backups clearly identified and preserved for use in recovery?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RC.RP-04
            Description: >
              Critical mission functions and cybersecurity risk management are considered to
              establish post-incident operational norms. The organization may not be able to
              return immediately to pre-incident operations. Temporary operational norms must
              be established that maintain essential services while full recovery proceeds.
            Implementation_Guidance: >
              Define acceptable temporary operational states for critical functions during
              recovery. Establish enhanced monitoring during the recovery period. Document
              and communicate temporary operational norms to all stakeholders. Plan for the
              transition from temporary to full operational status.
            Key_Questions:
              - "Are temporary operational norms defined for the recovery period?"
              - "Is enhanced monitoring in place during post-incident recovery?"
              - "Is the transition from temporary to full operations planned and tracked?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RC.RP-05
            Description: >
              The integrity of restored assets is verified, systems and services are restored,
              and normal operating status is confirmed. Before declaring recovery complete,
              the organization must verify that restored systems are functioning correctly,
              are free of threats, and meet security requirements.
            Implementation_Guidance: >
              Define acceptance criteria for restored systems (e.g., clean vulnerability scan,
              functional testing, security configuration verification). Require sign-off from
              both IT and security before a system is returned to production. Document
              verification results.
            Key_Questions:
              - "Are acceptance criteria defined for restored systems before returning to production?"
              - "Do both IT and security sign off on restored systems?"
              - "Are verification results documented as part of the incident record?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

          - ID: RC.RP-06
            Description: >
              The end of incident recovery is declared based on criteria, and incident-related
              documentation is completed. Formally closing an incident ensures all parties know
              the incident is over, all documentation is complete, and the lessons learned process
              can begin. Incidents that are never formally closed linger and prevent learning.
            Implementation_Guidance: >
              Define incident closure criteria in the incident response plan. Require a formal
              closure declaration from the incident commander. Ensure all incident documentation
              is complete and archived before closure. Schedule a post-incident review (lessons
              learned meeting) within a defined timeframe after closure.
            Key_Questions:
              - "Are incident closure criteria formally defined?"
              - "Is a formal closure declaration required from the incident commander?"
              - "Is a post-incident review scheduled for all significant incidents?"
            Policies:
              - Computer Security Threat Response Policy
              - Cyber Incident Response Standard
              - Incident Response Policy
              - Contingency Planning Policy

      - Title: "Recover: Incident Recovery Communication (RC.CO)"
        category_description: >
          Covers communication during the recovery phase — keeping stakeholders informed of
          recovery progress and, where required by regulation or good practice, providing
          public updates. Transparent, timely communication during recovery maintains trust
          and meets legal obligations.
        Subparts:

          - ID: RC.CO-03
            Description: >
              Recovery activities and progress in restoring operational capabilities are
              communicated to designated internal and external stakeholders. Stakeholders need
              regular updates on recovery status — when systems will be restored, what limitations
              exist in the interim, and what actions they may need to take. Communication gaps
              create uncertainty and erode trust.
            Implementation_Guidance: >
              Define a recovery communication cadence and format for each stakeholder group.
              Provide regular status updates against the recovery plan milestones.
              Communicate any changes to expected recovery timelines promptly.
              Use a single, authoritative communication channel to prevent conflicting messages.
            Key_Questions:
              - "Is there a defined communication cadence for recovery status updates?"
              - "Are recovery milestones communicated to stakeholders as they are achieved?"
              - "Is there a single authoritative channel for recovery communications?"
            Policies:
              - Computer Security Threat Response Policy
              - Contingency Planning Policy
              - Cyber Incident Response Standard
              - Incident Response Policy

          - ID: RC.CO-04
            Description: >
              Public updates on incident recovery are shared using approved methods and messaging.
              When an incident affects customers, partners, or the public, transparent and accurate
              public communication is essential. Poorly managed public communication can amplify
              reputational damage and create legal liability.
            Implementation_Guidance: >
              Pre-develop public communication templates for major incident scenarios.
              Designate a public communications lead (e.g., PR, communications team).
              Require legal and executive review before any public statement is released.
              Use approved channels (press releases, website, social media) for public updates.
              Monitor public and media reaction and respond promptly to misinformation.
            Key_Questions:
              - "Are public communication templates pre-developed for major incident scenarios?"
              - "Is there a designated public communications lead for incident recovery?"
              - "Is legal review required before any public statement is released?"
            Policies:
              - Computer Security Threat Response Policy
              - Contingency Planning Policy
              - Cyber Incident Response Standard
              - Incident Response Policy